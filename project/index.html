<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShiftSwap: The Deck</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@500;600;700;800&family=Noto+Naskh+Arabic:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="cards.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    /* Arabic gets a Naskh face for authentic RTL rendering */
    [lang="ar"], [dir="rtl"] {
      --ui: "Noto Naskh Arabic", "Manrope", system-ui, sans-serif;
      --display: "Noto Naskh Arabic", "Space Grotesk", system-ui, sans-serif;
    }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#05090d">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#05090d"/>
      <g transform="translate(600 400)">
        <rect x="-250" y="-150" width="300" height="300" rx="32" transform="rotate(-9 -100 0)" fill="#f5c518"/>
        <rect x="-50" y="-150" width="300" height="300" rx="32" transform="rotate(9 100 0)" fill="#ffe9a8"/>
        <path d="M -150 -30 h 300 M 110 -70 l 50 40 -50 40 M 150 30 h -300 M -110 -10 l -50 40 50 40" fill="none" stroke="#05090d" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </svg>
  </template>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- SheetJS for Excel upload parsing -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- domain + i18n (plain JS, transpiled harmlessly) -->
  <script type="text/babel" data-presets="react" src="data.jsx"></script>
  <script type="text/babel" data-presets="react" src="i18n.jsx"></script>

  <!-- components + screens -->
  <script type="text/babel" data-presets="react" src="cards.jsx"></script>
  <script type="text/babel" data-presets="react" src="screen-hand.jsx"></script>
  <script type="text/babel" data-presets="react" src="screen-market.jsx"></script>
  <script type="text/babel" data-presets="react" src="screen-scavenge.jsx"></script>
  <script type="text/babel" data-presets="react" src="screen-post.jsx"></script>
  <script type="text/babel" data-presets="react" src="screen-match.jsx"></script>
  <script type="text/babel" data-presets="react" src="screen-ledger.jsx"></script>
  <script type="text/babel" data-presets="react" src="screen-admin.jsx"></script>

  <!-- host + mount -->
  <script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(window.SSApp)
    );
  </script>
</body>
</html>
