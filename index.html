  /* ============================================================
     Trades Tab
     ============================================================ */
  function TradesTab({ offers, pendingRtm }) {
    return (
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <h2 style={{ fontSize: 22, fontWeight: 800, marginBottom: 8 }}>Active Trades</h2>
        <p style={{ fontSize: 13, opacity: .55, marginBottom: 24 }}>All open market offers and trades awaiting RTM sign-off. Read-only.</p>

        <div style={{ display: "flex", gap: 14, marginBottom: 24 }}>
          {[["Open offers", offers.length, "#f5c518"], ["Pending RTM", pendingRtm.length, "#22c55e"]].map(([lbl, n, c]) => (
            <div key={lbl} style={{ flex: 1, background: "rgba(255,255,255,.04)", borderRadius: 13, padding: "18px 22px", border: `1px solid ${c}22` }}>
              <div style={{ fontSize: 32, fontWeight: 900, color: c, lineHeight: 1 }}>{n}</div>
              <div style={{ fontSize: 12, opacity: .5, marginTop: 6, fontWeight: 700 }}>{lbl}</div>
            </div>
          ))}
        </div>

        <div style={{ background: "rgba(255,255,255,.03)", borderRadius: 14, overflow: "hidden", border: "1px solid rgba(255,255,255,.07)", marginBottom: 16 }}>
          <div style={{ padding: "13px 18px", borderBottom: "1px solid rgba(255,255,255,.07)", fontWeight: 800, fontSize: 13 }}>
            Open Offers ({offers.length})
          </div>
          {offers.length === 0 && <div style={{ padding: 28, textAlign: "center", opacity: .3, fontSize: 13 }}>No open offers</div>}
          {offers.map(o => {
            const ag = SS.agent(o.agent);
            if (!ag) return null;
            const isBundle = o.kind === "bundle";
            const isRest   = o.kind === "rest";
            const dayLabel = isBundle ? o.bundleCards?.map(b => b.day).join("+") : `${o.day} ${o.date}`;
            const kindTag  = isBundle ? `📦 ${o.bundleCards?.length}d bundle` : isRest ? "🔁 rest swap" : "⇄ time swap";
            return (
              <div key={o.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "13px 18px", borderBottom: "1px solid rgba(255,255,255,.04)", fontSize: 13 }}>
                <div style={{ width: 34, height: 34, borderRadius: "50%", background: "rgba(255,255,255,.08)", display: "grid", placeItems: "center", fontWeight: 800, fontSize: 12, flexShrink: 0 }}>
                  {SS.initials(ag.name)}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700 }}>{ag.name}</div>
                  <div style={{ fontSize: 11, opacity: .4, marginTop: 2 }}>{ag.site} · {SS.tier(ag.tier)?.short}</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontWeight: 700, fontSize: 12 }}>{dayLabel}</div>
                  <div style={{ fontSize: 10, opacity: .4, marginTop: 2 }}>{kindTag}</div>
                </div>
                <div style={{ fontSize: 22 }}>{isBundle ? "📦" : SS.shift(o.offered)?.emoji || "?"}</div>
                {o.wantType && o.wantType.length > 0 && (
                  <div style={{ fontSize: 11, opacity: .4 }}>→ {o.wantType.map(k => SS.shift(k)?.name || k).join(" / ")}</div>
                )}
                <div style={{ fontSize: 11, opacity: .3, whiteSpace: "nowrap" }}>{o.ts} ago</div>
              </div>
            );
          })}
        </div>

        {pendingRtm.length > 0 && (
          <div style={{ background: "rgba(255,255,255,.03)", borderRadius: 14, overflow: "hidden", border: "1px solid rgba(255,255,255,.07)" }}>
            <div style={{ padding: "13px 18px", borderBottom: "1px solid rgba(255,255,255,.07)", fontWeight: 800, fontSize: 13 }}>Pending RTM ({pendingRtm.length})</div>
            {pendingRtm.map(entry => {
              const ag2 = SS.agent(entry.offer?.agent);
              return (
                <div key={entry.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "13px 18px", borderBottom: "1px solid rgba(255,255,255,.04)", fontSize: 13 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700 }}>{SS.agent(SS.ME)?.name} ↔ {ag2?.name}</div>
                    <div style={{ fontSize: 11, opacity: .4, marginTop: 2 }}>Sealed {entry.sealedAt} · {entry.offer?.kind}</div>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: "4px 12px", borderRadius: 999, background: "rgba(245,197,24,.12)", color: "#f5c518" }}>⏳ Awaiting RTM</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  /* ============================================================
     Agents Tab
     ============================================================ */
  function AgentsTab({ schedule }) {
    const [weekN, setWeekN] = useState(1);
    const [q, setQ] = useState("");
    const days   = weekN === 1 ? (SS.DAYS || []) : (SS.DAYS_W2 || []);
    const roster = weekN === 1 ? (schedule.w1 || {}) : (schedule.w2 || {});
    const agents = SS.AGENTS.filter(a => !q
      || a.name.toLowerCase().includes(q.toLowerCase())
      || a.emp.toLowerCase().includes(q.toLowerCase())
      || a.site.toLowerCase().includes(q.toLowerCase())
    );

    return (
      <div style={{ maxWidth: 1020, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 20 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 800, marginBottom: 6 }}>Agent List</h2>
            <p style={{ fontSize: 13, opacity: .55 }}>{SS.AGENTS.length} agents · {SS.SITES.length} sites</p>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <div style={{ display: "flex", borderRadius: 9, overflow: "hidden", border: "1px solid rgba(255,255,255,.1)" }}>
              {[1, 2].map(n => (
                <button key={n} onClick={() => setWeekN(n)}
                  style={{ padding: "8px 16px", fontSize: 12, fontWeight: 700, border: "none", cursor: "pointer",
                    background: weekN === n ? "#f5c518" : "transparent", color: weekN === n ? "#1a1200" : "rgba(255,255,255,.45)" }}>
                  Week {n}
                </button>
              ))}
            </div>
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search agents…"
              style={{ padding: "8px 14px", borderRadius: 9, border: "1px solid rgba(255,255,255,.1)", background: "rgba(255,255,255,.04)", color: "inherit", fontSize: 13, width: 190, outline: "none" }} />
          </div>
        </div>

        <div style={{ overflowX: "auto", borderRadius: 14, border: "1px solid rgba(255,255,255,.07)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr style={{ background: "rgba(255,255,255,.04)", borderBottom: "1px solid rgba(255,255,255,.08)" }}>
                <th style={{ padding: "12px 16px", textAlign: "left", opacity: .55, fontWeight: 700 }}>Agent</th>
                <th style={{ padding: "12px 8px", textAlign: "center", opacity: .55, fontWeight: 700 }}>Site</th>
                <th style={{ padding: "12px 8px", textAlign: "center", opacity: .55, fontWeight: 700 }}>Tier</th>
                <th style={{ padding: "12px 8px", textAlign: "center", opacity: .55, fontWeight: 700 }}>Lang</th>
                {days.map(d => (
                  <th key={d.key} style={{ padding: "12px 7px", textAlign: "center", opacity: .55, fontWeight: 700, fontSize: 11 }}>
                    {d.key}<br /><span style={{ fontWeight: 500, fontSize: 9 }}>{d.date}</span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {agents.map((a, i) => {
                const agRoster = roster[a.id] || [];
                return (
                  <tr key={a.id} style={{ borderBottom: "1px solid rgba(255,255,255,.04)", background: i % 2 ? "transparent" : "rgba(255,255,255,.015)" }}>
                    <td style={{ padding: "11px 16px" }}>
                      <div style={{ fontWeight: 700 }}>{a.name}</div>
                      <div style={{ fontSize: 10, opacity: .4, marginTop: 2 }}>{a.emp}</div>
                    </td>
                    <td style={{ padding: "11px 8px", textAlign: "center", fontSize: 11, opacity: .55 }}>
                      {a.site.replace(" HQ","").replace(" Hub","").replace(" Floor","")}
                    </td>
                    <td style={{ padding: "11px 8px", textAlign: "center" }}>
                      <span style={{ fontSize: 10, fontWeight: 800, padding: "3px 8px", borderRadius: 999, background: "rgba(255,255,255,.08)" }}>
                        {SS.tier(a.tier)?.short}
                      </span>
                    </td>
                    <td style={{ padding: "11px 8px", textAlign: "center", fontSize: 14 }}>
                      {SS.FLAGS[a.lang] || ""}
                    </td>
                    {days.map(d => {
                      const card = agRoster.find(c => c.day === d.key);
                      return (
                        <td key={d.key} style={{ padding: "11px 7px", textAlign: "center" }}>
                          {card
                            ? <span title={card.shift} style={{ fontSize: 19 }}>{em(card.shift)}</span>
                            : <span style={{ opacity: .12 }}>·</span>}
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  /* ============================================================
     Analytics Tab
     ============================================================ */
  function AnalyticsTab() {
    const heat = SS.SHIFT_HEAT || [];
    const vol  = SS.WEEKLY_VOLUME || [];
    const maxW = Math.max(...heat.map(h => h.wanted), 1);
    const maxV = Math.max(...vol.map(v => v.n), 1);

    const totalTrades = vol.reduce((s, v) => s + v.n, 0);
    const avgTrades   = vol.length ? (totalTrades / vol.length).toFixed(1) : 0;
    const topShift    = heat.length ? heat.reduce((a, b) => b.wanted > a.wanted ? b : a) : null;
    const leastWanted = heat.length ? heat.reduce((a, b) => b.wanted < a.wanted ? b : a) : null;

    return (
      <div style={{ maxWidth: 860, margin: "0 auto" }}>
        <h2 style={{ fontSize: 22, fontWeight: 800, marginBottom: 8 }}>Analytics</h2>
        <p style={{ fontSize: 13, opacity: .55, marginBottom: 28 }}>Shift demand and trade volume across the floor.</p>

        {/* KPI strip */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 24 }}>
          {[
            { label: "Total trades logged",  val: totalTrades,                   color: "#f5c518" },
            { label: "Avg per week",          val: avgTrades,                     color: "#60a5fa" },
            { label: "Most-wanted shift",     val: topShift ? `${em(topShift.shift)} ${SS.shift(topShift.shift)?.name}` : "—", color: "#a78bfa" },
          ].map(k => (
            <div key={k.label} style={{ background: "rgba(255,255,255,.04)", borderRadius: 13, padding: "18px 20px", border: `1px solid ${k.color}18` }}>
              <div style={{ fontSize: 26, fontWeight: 900, color: k.color, lineHeight: 1 }}>{k.val}</div>
              <div style={{ fontSize: 11, opacity: .5, marginTop: 6, fontWeight: 700 }}>{k.label}</div>
            </div>
          ))}
        </div>

        {/* Shift demand */}
        <div style={{ background: "rgba(255,255,255,.03)", borderRadius: 14, padding: "22px 26px", border: "1px solid rgba(255,255,255,.07)", marginBottom: 20 }}>
          <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 18 }}>Shift Demand Index</div>
          {heat.map(h => (
            <div key={h.shift} style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 12 }}>
              <span style={{ fontSize: 20, width: 26, textAlign: "center", flexShrink: 0 }}>{em(h.shift)}</span>
              <span style={{ width: 120, fontSize: 12, fontWeight: 700, opacity: .7, flexShrink: 0 }}>{SS.shift(h.shift)?.name}</span>
              <div style={{ flex: 1, height: 10, background: "rgba(255,255,255,.06)", borderRadius: 999, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(h.wanted / maxW) * 100}%`, borderRadius: 999,
                  background: h.wanted > 60 ? "#f5c518" : h.wanted > 35 ? "#60a5fa" : "#6b7280", transition: "width .4s" }} />
              </div>
              <span style={{ width: 28, fontSize: 12, fontWeight: 800, textAlign: "right", opacity: .8, flexShrink: 0 }}>{h.wanted}</span>
              <span style={{ width: 72, fontSize: 10, opacity: .3, textAlign: "right", flexShrink: 0 }}>{h.posted} posted</span>
            </div>
          ))}
        </div>

        {/* Volume chart */}
        <div style={{ background: "rgba(255,255,255,.03)", borderRadius: 14, padding: "22px 26px", border: "1px solid rgba(255,255,255,.07)" }}>
          <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 20 }}>Weekly Trade Volume</div>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 120 }}>
            {vol.map(v => (
              <div key={v.wk} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
                <span style={{ fontSize: 10, fontWeight: 700, opacity: .6 }}>{v.n}</span>
                <div style={{ width: "100%", height: `${(v.n / maxV) * 96}px`, background: "#f5c518", opacity: .75, borderRadius: "4px 4px 0 0", minHeight: 4 }} />
                <span style={{ fontSize: 9, opacity: .35, writingMode: "vertical-rl", transform: "rotate(180deg)" }}>{v.wk}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ============================================================
     Admin Dashboard Shell
     ============================================================ */
  function AdminDashboard({ offers, pendingRtm, schedule, onImported, onLogout }) {
    const [tab, setTab] = useState("upload");
    const TABS = [
      { key: "upload",    ic: "📤", label: "Upload Schedule" },
      { key: "trades",    ic: "🔥", label: "Active Trades"   },
      { key: "agents",    ic: "👥", label: "Agent List"      },
      { key: "analytics", ic: "📊", label: "Analytics"       },
    ];

    return (
      <div style={{ minHeight: "100vh", background: "#0b0b1a", color: "#eceef8", display: "flex", flexDirection: "column", fontFamily: "system-ui,-apple-system,sans-serif" }}>
        {/* Top bar */}
        <div style={{ height: 56, borderBottom: "1px solid rgba(255,255,255,.07)", display: "flex", alignItems: "center", padding: "0 28px", gap: 16, background: "rgba(0,0,0,.2)", flexShrink: 0 }}>
          <div style={{ fontWeight: 900, fontSize: 16, display: "flex", alignItems: "center", gap: 10 }}>
            🃏 ShiftSwap
            <span style={{ fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 999, background: "rgba(245,197,24,.14)", color: "#f5c518" }}>Admin</span>
          </div>
          <div style={{ flex: 1 }} />
          <div style={{ fontSize: 12, opacity: .4, fontWeight: 600 }}>
            Signed in as <b style={{ opacity: .75 }}>admin</b>
          </div>
          <button onClick={onLogout}
            style={{ padding: "7px 18px", borderRadius: 8, border: "1px solid rgba(255,255,255,.1)", background: "transparent", color: "inherit", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
            Sign out
          </button>
        </div>

        <div style={{ display: "flex", flex: 1, minHeight: 0 }}>
          {/* Sidebar */}
          <div style={{ width: 215, borderRight: "1px solid rgba(255,255,255,.05)", padding: "18px 10px", flexShrink: 0, display: "flex", flexDirection: "column", gap: 3 }}>
            {TABS.map(t => (
              <button key={t.key} onClick={() => setTab(t.key)}
                style={{
                  display: "flex", alignItems: "center", gap: 11, padding: "11px 14px",
                  borderRadius: 9, border: "none", cursor: "pointer", textAlign: "left",
                  background: tab === t.key ? "rgba(245,197,24,.1)" : "transparent",
                  color: tab === t.key ? "#f5c518" : "rgba(255,255,255,.45)",
                  fontWeight: tab === t.key ? 800 : 600, fontSize: 13, transition: "background .15s, color .15s",
                }}>
                <span style={{ fontSize: 18 }}>{t.ic}</span>
                {t.label}
              </button>
            ))}
            <div style={{ flex: 1 }} />
            <div style={{ fontSize: 10, opacity: .18, padding: "6px 14px", fontWeight: 600 }}>ShiftSwap v0.1</div>
          </div>

          {/* Content */}
          <div style={{ flex: 1, overflowY: "auto", padding: "34px 42px" }}>
            {tab === "upload"    && <UploadTab schedule={schedule} onImported={onImported} />}
            {tab === "trades"    && <TradesTab offers={offers} pendingRtm={pendingRtm} />}
            {tab === "agents"    && <AgentsTab schedule={schedule} />}
            {tab === "analytics" && <AnalyticsTab />}
          </div>
        </div>
      </div>
    );
  }

  window.AdminDashboard = AdminDashboard;
})();

  </script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  /* ---------- Agent shell ------------------------------------------------- */
  function AgentApp({ sharedSchedule, scheduleAlerts = [], onDismissAlert, onLogout }) {
    const [intro, setIntro] = useState(true);
    const [showDisclaimer, setShowDisclaimer] = useState(false);
    const [tw, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
    const [reminder, setReminder] = useState(false);
    const [lang, setLang] = useState("EN");
    const [screen, setScreen] = useState("hand");      // hand|market|post|ledger|profile
    const me0 = SS.agent(SS.ME);
    const [flexible, setFlexible] = useState(me0.flexible);
    const [trades, setTrades] = useState(me0.trades);
    const [handCards,   setHandCards]   = useState(SS.MY_HAND.map(c => ({ ...c })));
    const [handCardsW2, setHandCardsW2] = useState((SS.MY_HAND_W2 || []).map(c => ({ ...c })));
    const [offers, setOffers] = useState(SS.OFFERS.map(o => ({ ...o })));
    const [listedIds, setListedIds] = useState([]);
    const [sheetOffer, setSheetOffer] = useState(null);
    const [postPreselect, setPostPreselect] = useState(null);
    const [bundlePreselect, setBundlePreselect] = useState(null);
    const [toast, setToast] = useState(null);
    const [pendingRtm, setPendingRtm] = useState(() => {
      try {
        const stored = JSON.parse(localStorage.getItem("ss_pending_rtm") || "null");
        if (stored) return stored;
      } catch {}
      // Seed one demo entry so the section is visible on first load
      return [{
        id: "rtm-demo-1",
        offer: { id: "o1-demo", kind: "time", agent: "a3", day: "Mon", date: "Jun 8", offered: "EARLY", wantType: ["GRIND"] },
        myCard: { id: "s1", shift: "GRIND", day: "Mon", date: "Jun 8" },
        sealedAt: "2 Jun",
      }];
    });

    const rtl = false;
    useEffect(() => {
      document.documentElement.setAttribute("dir", "ltr");
      document.documentElement.setAttribute("lang", "en");
    }, []);
    useEffect(() => {
      localStorage.setItem("ss_pending_rtm", JSON.stringify(pendingRtm));
    }, [pendingRtm]);

    const [scavengeProposals, setScavengeProposals] = useState(() => {
      try {
        const stored = JSON.parse(localStorage.getItem("ss_scavenge_props") || "null");
        if (stored) return stored;
      } catch {}
      return [{
        id: "scp-demo-1",
        fromAgentId: "a1", toAgentId: "a3",
        fromCard: { id: "s1", shift: "GRIND", day: "Mon", date: "Jun 8" },
        toShift: "EARLY", toDay: "Mon", toDate: "Jun 8",
      }];
    });
    useEffect(() => {
      localStorage.setItem("ss_scavenge_props", JSON.stringify(scavengeProposals));
    }, [scavengeProposals]);
    useEffect(() => {
      if (sharedSchedule && sharedSchedule.w2 && sharedSchedule.w2[SS.ME]) {
        const w2 = sharedSchedule.w2[SS.ME];
        setHandCardsW2(w2.map((c, i) => ({ ...c, id: c.id || ("w2s"+(i+1)), agent: SS.ME })));
      }
    }, [sharedSchedule]);

    // Realtime: when configured, the market mirrors the live trade_offers table.
    // Optimistic local writes still give instant feedback; this reconciles them.
    useEffect(() => {
      if (!window.SSDB || !window.SSDB.enabled) return;
      const unsub = window.SSDB.subscribeOffers((rows) => {
        setOffers(prev => {
          // keep any just-posted optimistic "mine" rows the DB hasn't echoed yet
          const ids = new Set(rows.map(r => r.id));
          const pendingMine = prev.filter(o => o.mine && !ids.has(o.id));
          return [...pendingMine, ...rows];
        });
      });
      return unsub;
    }, []);

    const t = useMemo(() => (k) => T(lang, k), [lang]);

    function fireToast(msg) {
      setToast(msg);
      setTimeout(() => setToast(null), 2200);
    }
    function fireReminder() { setReminder(true); }

    function openCard(c) {                 // tap a card in My Hand → list it
      if (listedIds.includes(c.id)) return;
      setPostPreselect(c.id);
      setScreen("post");
    }
    function openOffer(o) { setSheetOffer(o); }
    function clearPreselect() { setPostPreselect(null); }

    function openBundlePost(cardIds) {
      setBundlePreselect(cardIds);
      setPostPreselect(null);
      setScreen("post");
    }
    function clearBundlePreselect() { setBundlePreselect(null); }

    function postOffer({ cardId, wantTypes, wantRestDay, flex, note, kind, bundleCardIds, wantRestDaysList }) {
      // ---- Bundle trade ----
      if (kind === "bundle" && bundleCardIds && bundleCardIds.length >= 2) {
        const allHandCards = [...handCards, ...handCardsW2];
        const bundleCards = allHandCards
          .filter(c => bundleCardIds.includes(c.id))
          .map(c => ({ cardId: c.id, day: c.day, date: c.date, shift: c.shift }));
        const newOffer = {
          id: "mine-bundle-" + Date.now(),
          agent: SS.ME, mine: true, kind: "bundle",
          bundleCards,
          wantType: (wantTypes && wantTypes.length) ? wantTypes : [],
          note: (note && note.trim()) ? note.trim() : "Looking for a bundle swap.",
          ts: "now",
        };
        setOffers(os => [newOffer, ...os]);
        setListedIds(ids => [...ids, ...bundleCardIds]);
        if (window.SSDB) window.SSDB.insertOffer(newOffer);
        setScreen("market");
        fireToast("✓ Bundle posted to market");
        return;
      }
      // ---- Rest-bundle trade ----
      if (kind === "rest-bundle" && bundleCardIds && bundleCardIds.length >= 2 && wantRestDaysList) {
        const allHandCards2 = [...handCards, ...handCardsW2];
        const rbCards = allHandCards2
          .filter(c => bundleCardIds.includes(c.id))
          .map(c => ({ cardId: c.id, day: c.day, date: c.date, shift: c.shift }));
        const newOffer = {
          id: "mine-rb-" + Date.now(),
          agent: SS.ME, mine: true, kind: "rest-bundle",
          bundleCards: rbCards,
          wantRestDaysList,
          note: (note && note.trim()) ? note.trim() : "Looking to swap my days off.",
          ts: "now",
        };
        setOffers(os => [newOffer, ...os]);
        setListedIds(ids => [...ids, ...bundleCardIds]);
        if (window.SSDB) window.SSDB.insertOffer(newOffer);
        setScreen("market");
        fireToast("✓ Rest day bundle posted to market");
        return;
      }
      // ---- Single card trade ----
      const card = handCards.find(c => c.id === cardId) || handCardsW2.find(c => c.id === cardId);
      if (!card) return;
      const isRest = card.shift === "CROWN";
      let newOffer;
      if (isRest) {
        // double trade: I give my day off (card.day) and want a day off on wantRestDay
        const yCard = handCards.find(c => c.day === wantRestDay);
        newOffer = {
          id: "mine-" + cardId + "-" + Date.now(),
          agent: SS.ME, mine: true, kind: "rest",
          day: card.day, date: card.date,
          offered: "CROWN",
          wantRestDay,
          wantRestDate: yCard ? yCard.date : "",
          workShift: yCard ? yCard.shift : "GRIND",
          note: (note && note.trim()) ? note.trim() : "Looking to swap this one.",
          ts: "now",
        };
      } else {
        newOffer = {
          id: "mine-" + cardId + "-" + Date.now(),
          agent: SS.ME, mine: true, kind: "time",
          day: card.day, date: card.date,
          offered: card.shift,
          wantType: (wantTypes && wantTypes.length) ? wantTypes : ["GRIND"],
          note: (note && note.trim()) ? note.trim() : "Looking to swap this one.",
          ts: "now",
        };
      }
      setOffers(os => [newOffer, ...os]);
      setListedIds(ids => [...ids, cardId]);
      if (window.SSDB) window.SSDB.insertOffer(newOffer);
      setScreen("market");
      fireToast("✓ " + t("posted"));
    }

    function completeTrade(offer, myCard, bundleLegs, rtmMsg) {
      setOffers(os => os.filter(o => o.id !== offer.id));
      if (myCard) setListedIds(ids => ids.filter(id => id !== myCard.id));
      const sealedAt = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short" });
      const entry = { id: "rtm-" + Date.now(), offer, myCard: myCard || null, bundleLegs: bundleLegs || null, sealedAt, rtmMsg: rtmMsg || "" };
      setPendingRtm(ps => [entry, ...ps]);
      if (window.SSDB) { window.SSDB.removeOffer(offer.id); window.SSDB.insertMatch(entry); }
    }

    function approveRtm(rtmId) {
      const entry = pendingRtm.find(p => p.id === rtmId);
      if (entry) {
        const { offer, myCard, bundleLegs } = entry;
        function applyTrade(cards) {
          if (offer.kind === "time" && myCard) {
            // I gave myCard's shift, I receive offer.offered — same day
            return cards.map(c => c.id === myCard.id ? { ...c, shift: offer.offered } : c);
          }
          if (offer.kind === "rest") {
            // offer.day → I now rest (CROWN); offer.wantRestDay → I now work offer.workShift
            return cards.map(c => {
              if (c.day === offer.day)        return { ...c, shift: "CROWN" };
              if (c.day === offer.wantRestDay) return { ...c, shift: offer.workShift };
              return c;
            });
          }
          if (offer.kind === "bundle" && bundleLegs) {
            return cards.map(c => {
              const leg = bundleLegs.find(l => l.myCard && l.myCard.id === c.id);
              return leg ? { ...c, shift: leg.theirShift } : c;
            });
          }
          if (offer.kind === "rest-bundle") {
            const agRoster = ((SS.ROSTER || {})[offer.agent]) || [];
            const legs = (offer.wantRestDaysList || []).map((giveDay, i) => ({
              giveDay, getDay: offer.bundleCards?.[i]?.day,
              workShift: agRoster.find(c => c.day === giveDay)?.shift || "GRIND",
            }));
            return cards.map(c => {
              const gLeg = legs.find(l => l.giveDay === c.day);
              const rLeg = legs.find(l => l.getDay === c.day);
              if (gLeg) return { ...c, shift: gLeg.workShift };
              if (rLeg) return { ...c, shift: "CROWN" };
              return c;
            });
          }
          return cards;
        }
        setHandCards(applyTrade);
        setHandCardsW2(applyTrade);
        // Unlist any bundle cards still in the listed pool
        if (bundleLegs) {
          const ids = bundleLegs.map(l => l.myCard?.id).filter(Boolean);
          if (ids.length) setListedIds(ls => ls.filter(id => !ids.includes(id)));
        }
      }
      setPendingRtm(ps => ps.filter(p => p.id !== rtmId));
      setTrades(n => n + 1);
      if (window.SSDB) window.SSDB.resolveMatch(rtmId, "approved");
      fireToast("✅ RTM approved — your hand is updated");
    }

    function declineRtm(rtmId) {
      const entry = pendingRtm.find(p => p.id === rtmId);
      if (entry) {
        // Restore the original offer so both agents can try again
        setOffers(os => [{ ...entry.offer, ts: "now" }, ...os]);
        if (window.SSDB) { window.SSDB.reopenOffer({ ...entry.offer, ts: "now" }); window.SSDB.resolveMatch(rtmId, "declined"); }
      }
      setPendingRtm(ps => ps.filter(p => p.id !== rtmId));
      fireToast("❌ RTM declined — trade reopened for both agents");
    }

    function sendScavengeProposal(proposal) {
      setScavengeProposals(ps => [{ ...proposal, id: "scp-" + Date.now() }, ...ps]);
      const toAg = SS.agent(proposal.toAgentId);
      fireToast("📤 Proposal sent to " + toAg.name.split(" ")[0]);
    }

    function acceptScavengeProposal(proposalId) {
      const p = scavengeProposals.find(x => x.id === proposalId);
      if (!p) return;
      setScavengeProposals(ps => ps.filter(x => x.id !== proposalId));
      setSheetOffer({
        id: proposalId + "-syn",
        kind: "time",
        agent: p.toAgentId,
        day: p.toDay, date: p.toDate,
        offered: p.toShift,
        wantType: [p.fromCard.shift],
        _startPhase: "confirm",
        _preCardId: p.fromCard.id,
      });
    }

    function declineScavengeProposal(proposalId) {
      setScavengeProposals(ps => ps.filter(x => x.id !== proposalId));
      fireToast("❌ Proposal declined");
    }

    const ctx = {
      t, lang, setLang, screen, setScreen,
      flexible, setFlexible, trades,
      handCards, offers, listedIds,
      openCard, openOffer, postOffer, clearPreselect,
      postPreselect, bundlePreselect, openBundlePost, clearBundlePreselect, completeTrade,
      pendingRtm, approveRtm, declineRtm,
      scavengeProposals, sendScavengeProposal, acceptScavengeProposal, declineScavengeProposal,
      fireToast,
      handCardsW2, scheduleAlerts, onDismissAlert: onDismissAlert || (() => {}),
      onLogout: onLogout || (() => {}),
    };

    const titles = {
      hand: t("myHand"), market: t("theMarket"), post: t("postTrade"),
      ledger: t("theLedger"), profile: t("profile"),
    };

    const Screen = {
      hand: window.MyHand, market: window.Market, post: window.PostTrade,
      ledger: window.Ledger, profile: Profile,
    }[screen];

    const navItems = [
      { key: "hand",   ic: "🃏", label: t("hand") },
      { key: "market", ic: "🔥", label: t("market") },
      { key: "ledger", ic: "📊", label: t("ledger") },
      { key: "profile",ic: "👤", label: t("profile") },
    ];

    return (
      <SSCtx.Provider value={ctx}>
        <style>{`
          :root{
            --gold:${tw.accent[0]};
            --gold-soft:${tw.accent[1]};
            --display:${TW_FONTS[tw.displayFont] || TW_FONTS.Grotesk};
          }
          .t-brunch{ --c1:${tw.brunchCard[0]}; --c2:${tw.brunchCard[1]}; }
          .t-dawn{ --c1:${tw.dawnCard[0]}; --c2:${tw.dawnCard[1]}; }
          .card:not(.is-disabled){ filter:saturate(${tw.cardVividness}%); }
        `}</style>
        {window.TweaksPanel && (
          <window.TweaksPanel title="Tweaks">
            <window.TweakSection label="Your new shift cards" />
            <window.TweakColor label="11am · Brunch Run" value={tw.brunchCard}
              options={[["#f7a81b","#d9630e"],["#ff7a3c","#e8402b"],["#22b8a6","#0f7a72"],["#5b8def","#2f5fd0"]]}
              onChange={(v) => setTweak("brunchCard", v)} />
            <window.TweakColor label="6am · Dawn Patrol" value={tw.dawnCard}
              options={[["#7e93da","#ff9166"],["#9b6cf0","#f06aa6"],["#3a2d72","#1c1640"],["#ff9a5c","#d8542b"]]}
              onChange={(v) => setTweak("dawnCard", v)} />
            <window.TweakSlider label="Card vividness" value={tw.cardVividness}
              min={70} max={150} step={5} unit="%"
              onChange={(v) => setTweak("cardVividness", v)} />
            <window.TweakSection label="Brand" />
            <window.TweakColor label="Accent" value={tw.accent}
              options={[["#f5c518","#ffe9a8"],["#3b82f6","#bfdbfe"],["#22c55e","#bbf7d0"],["#a855f7","#e9d5ff"]]}
              onChange={(v) => setTweak("accent", v)} />
            <window.TweakSection label="Type" />
            <window.TweakRadio label="Display font" value={tw.displayFont}
              options={["Grotesk", "Manrope", "Serif"]}
              onChange={(v) => setTweak("displayFont", v)} />
          </window.TweaksPanel>
        )}
        <div className="stage">
          <div className="device">
            <div className="screen">
              <div className="notch" />

              {intro ? (
                <DealIntro lang={lang} onEnter={() => { setIntro(false); setShowDisclaimer(true); }} />
              ) : (
                <>
                  {/* status bar */}
                  <div className="statusbar">
                    <span>9:41</span>
                    <span className="right">
                      <span>{rtl ? "▮▮▮" : "📶"}</span>
                      <span>{rtl ? "" : "🔋"}</span>
                    </span>
                  </div>

                  {/* app bar */}
                  <div className="appbar">
                    <div className="appbar__title">
                      <span className="appbar__eyebrow">{t("eyebrow")}</span>
                      <span className="appbar__h">{titles[screen]}</span>
                    </div>
                    <div className="appbar__actions">
                      <div className="lang-static" title="You speak English + your specialty language">
                        <span>EN</span>
                        <span className="lang-static__plus">+</span>
                        <span>{SS.FLAGS[SS.agent(SS.ME).lang]}</span>
                      </div>
                    </div>
                  </div>

                  {/* RTM reminder (non-blocking) */}
                  {reminder && <ReminderBar onClose={() => setReminder(false)} />}

                  {/* scroll body */}
                  <div className="body" key={screen}>
                    {Screen ? <Screen /> : null}
                  </div>

                  {/* bottom nav */}
                  <div className="nav">
                    {navItems.slice(0, 2).map(n => (
                      <button key={n.key} className={"nav__item" + (screen === n.key ? " active" : "")}
                        onClick={() => setScreen(n.key)}>
                        <span className="ic">{n.ic}</span><span>{n.label}</span>
                      </button>
                    ))}
                    <button className="nav__post" title={t("postTrade")}
                      onClick={() => { setPostPreselect(null); setScreen("post"); }}>+</button>
                    {navItems.slice(2).map(n => (
                      <button key={n.key} className={"nav__item" + (screen === n.key ? " active" : "")}
                        onClick={() => setScreen(n.key)}>
                        <span className="ic">{n.ic}</span><span>{n.label}</span>
                      </button>
                    ))}
                  </div>

                  {/* match bottom sheet */}
                  <div className={"sheet-backdrop" + (sheetOffer ? " show" : "")}
                    onClick={(e) => { if (e.target === e.currentTarget) setSheetOffer(null); }}>
                    <div className="sheet">
                      {sheetOffer && (
                        <window.MatchSheet offer={sheetOffer}
                          onClose={() => setSheetOffer(null)}
                          onDone={() => { setSheetOffer(null); setScreen("hand"); }} />
                      )}
                    </div>
                  </div>

                  {/* toast */}
                  <div className={"toast" + (toast ? " show" : "")}>{toast}</div>

                  {/* login compliance modal */}
                  {showDisclaimer && <DisclaimerModal onAck={() => setShowDisclaimer(false)} />}
                </>
              )}
            </div>
          </div>
        </div>
      </SSCtx.Provider>
    );
  }

  /* ---------- Root: login gate + routing ---------------------------------- */
  function App() {
    const [session, setSession] = useState(() => {
      try { return JSON.parse(localStorage.getItem("ss_session") || "null"); } catch { return null; }
    });
    const [sharedSchedule, setSharedSchedule] = useState({ w1: SS.ROSTER, w2: SS.ROSTER_W2 || {} });
    const [scheduleAlerts, setScheduleAlerts] = useState([]);

    function handleLogin(s) { localStorage.setItem("ss_session", JSON.stringify(s)); setSession(s); }
    function handleLogout() { localStorage.removeItem("ss_session"); setSession(null); }
    function handleImported(newSchedule, alerts) {
      setSharedSchedule(newSchedule);
      if (alerts && alerts.length) setScheduleAlerts(prev => [...prev, ...alerts]);
      if (window.SSDB) window.SSDB.upsertSchedules(newSchedule);
    }
    function handleDismissAlert(idx) { setScheduleAlerts(a => a.filter((_, i) => i !== idx)); }

    if (!session) return <LoginGate onLogin={handleLogin} />;

    if (session.role === "admin") {
      return <window.AdminDashboard
        offers={SS.OFFERS.slice()}
        pendingRtm={[]}
        schedule={sharedSchedule}
        onImported={handleImported}
        onLogout={handleLogout} />;
    }

    return <AgentApp
      sharedSchedule={sharedSchedule}
      scheduleAlerts={scheduleAlerts}
      onDismissAlert={handleDismissAlert}
      onLogout={handleLogout} />;
  }

  window.SSApp = App;
})();

  </script>
  <!-- host + mount: hydrate from Supabase (if configured) then render -->
  <script type="text/babel" data-presets="react">
    (async () => {
      try { if (window.SSDB && window.SSDB.boot) await window.SSDB.boot(); }
      catch (e) { console.warn("boot error", e); }
      ReactDOM.createRoot(document.getElementById("root")).render(
        React.createElement(window.SSApp)
      );
    })();
  </script>
</body>
</html>
