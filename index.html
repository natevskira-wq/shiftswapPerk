<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShiftSwap: The Deck</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
/* ===== styles.css ===== */
/* ===========================================================================
   ShiftSwap: The Deck — app shell
   =========================================================================== */
:root {
  --display: "Space Grotesk", system-ui, sans-serif;
  --ui: "Manrope", system-ui, sans-serif;

  --table-0: #0b131b;
  --table-1: #0f1923;
  --table-2: #16242f;
  --surface: #16242f;
  --surface-2: #1c2e3b;
  --surface-3: #243845;
  --line: rgba(255,255,255,.09);
  --line-2: rgba(255,255,255,.14);

  --ink: #f4f1ea;
  --ink-dim: #9fb0bd;
  --ink-faint: #64798a;

  --gold: #f5c518;
  --gold-soft: #ffe9a8;
  --green: #34d399;
  --red: #f87171;

  --shadow-pop: 0 24px 48px -20px rgba(0,0,0,.75);
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--ui);
  background:
    radial-gradient(120% 90% at 50% -10%, #18313f 0%, var(--table-1) 45%, var(--table-0) 100%);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--gold); color: #1b1300; }

/* faint card-table felt pattern */
body::before {
  content: "";
  position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 2px, transparent 2px 22px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,.012) 0 2px, transparent 2px 22px);
  pointer-events: none; z-index: 0;
}

/* ---- device frame -------------------------------------------------------- */
.stage {
  position: fixed; inset: 0;
  display: grid; place-items: center;
  padding: 20px;
  z-index: 1;
}
.device {
  position: relative;
  width: 412px; height: 880px;
  max-height: calc(100vh - 32px);
  aspect-ratio: 412 / 880;
  background: #05090d;
  border-radius: 46px;
  padding: 7px;
  box-shadow:
    0 0 0 2px #1d2a33,
    0 50px 90px -30px rgba(0,0,0,.85),
    0 10px 30px -10px rgba(0,0,0,.6);
}
.screen {
  position: relative;
  width: 100%; height: 100%;
  border-radius: 40px;
  overflow: hidden;
  background:
    radial-gradient(120% 70% at 50% -5%, #18313f 0%, var(--table-1) 50%, var(--table-0) 100%);
  display: flex; flex-direction: column;
}
.notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 120px; height: 26px; background: #05090d;
  border-radius: 0 0 16px 16px; z-index: 60;
}

/* ---- status bar ---------------------------------------------------------- */
.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px 4px; font-size: 13px; font-weight: 700;
  color: var(--ink); z-index: 50; flex: 0 0 auto;
}
.statusbar .right { display: flex; gap: 6px; align-items: center; font-size: 12px; }

/* ---- app header ---------------------------------------------------------- */
.appbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 18px 12px; flex: 0 0 auto; z-index: 30;
}
.appbar__title { display: flex; flex-direction: column; gap: 1px; }
.appbar__eyebrow { font-size: 10px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); }
.appbar__h { font-family: var(--display); font-weight: 700; font-size: 22px; letter-spacing: -.02em; }
.appbar__actions { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 38px; height: 38px; border-radius: 12px;
  display: grid; place-items: center;
  background: var(--surface); border: 1px solid var(--line);
  color: var(--ink); font-size: 15px;
}
.icon-btn:hover { background: var(--surface-2); }
.lang-btn {
  height: 38px; padding: 0 12px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--line); color: var(--ink);
  font-weight: 800; font-size: 12px; display: inline-flex; align-items: center; gap: 6px;
}
.lang-btn:hover { border-color: var(--gold); }

/* ---- scroll body --------------------------------------------------------- */
.body {
  flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
  padding: 4px 18px 110px;
  scrollbar-width: none;
}
.body::-webkit-scrollbar { display: none; }

/* ---- bottom nav ---------------------------------------------------------- */
.nav {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 40;
  display: flex; align-items: flex-end; justify-content: space-around;
  padding: 10px 14px 22px;
  background: linear-gradient(to top, var(--table-0) 55%, rgba(11,19,27,.0));
}
.nav__item {
  background: none; border: 0; color: var(--ink-faint);
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 800; letter-spacing: .02em;
  padding: 4px 8px; transition: color .15s;
}
.nav__item .ic { font-size: 19px; line-height: 1; filter: grayscale(.4) opacity(.7); }
.nav__item.active { color: var(--ink); }
.nav__item.active .ic { filter: none; }
.nav__post {
  width: 56px; height: 56px; border-radius: 18px; margin-top: -18px;
  background: linear-gradient(160deg, var(--gold-soft), var(--gold));
  color: #2a1d00; display: grid; place-items: center; font-size: 26px; font-weight: 800;
  border: 0; box-shadow: 0 10px 22px -8px rgba(245,197,24,.7), 0 2px 0 #b88f00 inset;
  transition: transform .15s;
}
.nav__post:active { transform: scale(.94); }

/* ---- generic UI ---------------------------------------------------------- */
.section-label {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-dim); margin: 18px 2px 10px;
}
.section-label .count { color: var(--ink-faint); }

.btn {
  border: 0; border-radius: 14px; padding: 13px 18px;
  font-weight: 800; font-size: 14px; font-family: var(--ui);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .12s, filter .15s, background .15s;
}
.btn:active { transform: scale(.97); }
.btn--gold { background: linear-gradient(160deg, var(--gold-soft), var(--gold)); color: #2a1d00; box-shadow: 0 8px 18px -8px rgba(245,197,24,.6); }
.btn--gold:hover { filter: brightness(1.05); }
.btn--ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line-2); }
.btn--ghost:hover { background: var(--surface-2); }
.btn--full { width: 100%; }
.btn--lg { padding: 16px; font-size: 15px; border-radius: 16px; }

.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 11px; border-radius: 999px; font-size: 12px; font-weight: 700;
  background: var(--surface); border: 1px solid var(--line); color: var(--ink-dim);
  white-space: nowrap; transition: all .14s;
}
.pill.active { background: var(--gold); color: #2a1d00; border-color: transparent; }
.pill:not(.active):hover { border-color: var(--line-2); color: var(--ink); }

.chiprow { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 8px; scrollbar-width: none; }
.chiprow::-webkit-scrollbar { display: none; }

.avatar {
  width: 34px; height: 34px; border-radius: 11px; flex: 0 0 auto;
  display: grid; place-items: center; font-weight: 800; font-size: 13px;
  font-family: var(--display); color: #0c1620;
  background: linear-gradient(150deg, #cfe0ec, #93a9bb);
}
.avatar.sm { width: 26px; height: 26px; font-size: 11px; border-radius: 8px; }

.glass {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 18px;
}

/* match badge */
.matchbadge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 900; letter-spacing: .08em;
  padding: 3px 8px; border-radius: 999px;
  background: linear-gradient(120deg, #34d399, #10b981); color: #022b1c;
  box-shadow: 0 0 0 2px rgba(52,211,153,.25), 0 6px 14px -6px rgba(16,185,129,.7);
}

/* toast */
.toast {
  position: absolute; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(20px);
  background: #0c1620; border: 1px solid var(--line-2); color: var(--ink);
  padding: 11px 16px; border-radius: 12px; font-size: 13px; font-weight: 700;
  z-index: 90; opacity: 0; transition: all .3s cubic-bezier(.2,.8,.3,1); white-space: nowrap;
  box-shadow: var(--shadow-pop); display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* modal sheet */
.sheet-backdrop {
  position: absolute; inset: 0; z-index: 80;
  background: rgba(5,9,13,.66); backdrop-filter: blur(3px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; transition: opacity .25s; pointer-events: none;
}
.sheet-backdrop.show { opacity: 1; pointer-events: auto; }
.sheet {
  width: 100%; background: var(--table-1); border-radius: 26px 26px 0 0;
  border-top: 1px solid var(--line-2);
  max-height: 92%; overflow-y: auto; scrollbar-width: none;
  padding: 10px 18px 24px;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.2,.8,.25,1);
  box-shadow: 0 -20px 50px -20px rgba(0,0,0,.7);
}
.sheet-backdrop.show .sheet { transform: translateY(0); }
.sheet::-webkit-scrollbar { display: none; }
.sheet__grab { width: 40px; height: 4px; border-radius: 999px; background: var(--line-2); margin: 6px auto 14px; }

/* tiny helpers */
.muted { color: var(--ink-dim); }
.faint { color: var(--ink-faint); }
.row { display: flex; align-items: center; gap: 10px; }
.between { justify-content: space-between; }
.num { font-family: var(--display); font-weight: 700; font-variant-numeric: tabular-nums; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* RTL adjustments */
[dir="rtl"] .card__index.tl { left: auto; right: 10px; }
[dir="rtl"] .card__index.br { right: auto; left: 10px; }
[dir="rtl"] .card__flag { right: auto; left: 8px; }
[dir="rtl"] .card__rankbadge { left: auto; right: 8px; }
[dir="rtl"] .appbar__eyebrow { letter-spacing: 0; }

/* fade/slide screen transitions — transform only, so content is never gated on opacity */
.screen-enter { animation: screenIn .32s cubic-bezier(.2,.8,.25,1) both; }
@keyframes screenIn { from { transform: translateY(10px); } to { transform: none; } }
/* ===== cards.css ===== */
/* ===========================================================================
   ShiftSwap — Card art system
   A shift card is a collectible trading card: index corners, character art,
   foil borders for advanced tiers, flag accents for language specialty.
   =========================================================================== */

.card {
  position: relative;
  border-radius: 18px;
  aspect-ratio: 3 / 4.05;
  padding: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  isolation: isolate;
  color: var(--ink, #2a1f00);
  background: linear-gradient(155deg, var(--c1) 0%, var(--c2) 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,.35) inset,
    0 18px 30px -16px rgba(0,0,0,.7),
    0 4px 10px -4px rgba(0,0,0,.5);
  border: 1px solid rgba(255,255,255,.16);
  user-select: none;
  transition: transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s ease;
  will-change: transform;
}
.card.tilt:hover {
  transform: translateY(-6px) rotateX(6deg) rotateY(-4deg) scale(1.02);
  box-shadow:
    0 1px 0 rgba(255,255,255,.4) inset,
    0 34px 50px -20px rgba(0,0,0,.8),
    0 8px 18px -6px rgba(0,0,0,.55);
}

/* subtle felt-paper grain + radial spotlight behind the character */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(120% 80% at 50% 30%, rgba(255,255,255,.28), transparent 60%);
  mix-blend-mode: soft-light;
  z-index: 0;
  pointer-events: none;
}

/* ---- card chrome --------------------------------------------------------- */
.card__top {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 6px;
}
.card__name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 15px;
  line-height: 1.05;
  letter-spacing: -.01em;
  display: flex;
  align-items: center;
  gap: 5px;
}
.card__nameemoji { font-size: 14px; line-height: 1; }
.card__namewrap { max-width: 78%; display: flex; flex-direction: column; gap: 3px; }
/* the time always sits directly under the nickname — name is flavor, time is truth */
.card__nametime {
  font-family: var(--display);
  font-weight: 800;
  font-size: 13px;
  line-height: 1;
  letter-spacing: -.01em;
  opacity: .82;
  font-variant-numeric: tabular-nums;
}
.card.sm .card__name { font-size: 12px; }
.card.sm .card__nameemoji { font-size: 11px; }
.card.sm .card__nametime { font-size: 11px; }
.card.sm .card__namewrap { max-width: 92%; gap: 2px; }
.card__tierpip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 3px 6px;
  border-radius: 999px;
  background: rgba(0,0,0,.18);
  color: inherit;
  white-space: nowrap;
}
.card.ink-light .card__tierpip { background: rgba(255,255,255,.16); }

/* big character */
.card__art {
  position: relative;
  z-index: 1;
  flex: 1;
  display: grid;
  place-items: center;
  margin: 2px 0;
}
.card__emoji {
  font-size: 58px;
  line-height: 1;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,.35));
}
.card.sm .card__emoji { font-size: 40px; }
.card__watermark {
  position: absolute;
  font-size: 120px;
  opacity: .10;
  z-index: 0;
  pointer-events: none;
  transform: rotate(-8deg);
}

/* index corners like a playing card */
.card__index {
  position: absolute;
  z-index: 2;
  font-family: var(--display);
  font-weight: 800;
  font-size: 11px;
  line-height: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  opacity: .9;
}
.card__index .ix-emoji { font-size: 12px; }
.card__index.tl { top: 10px; left: 10px; }
.card__index.br { bottom: 10px; right: 10px; transform: rotate(180deg); }
.card.sm .card__index { display: none; }

/* bottom info */
.card__bottom {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card__time {
  font-family: var(--display);
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -.01em;
}
.card__meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
}
.card__daychip {
  background: rgba(0,0,0,.2);
  padding: 2px 7px;
  border-radius: 6px;
  letter-spacing: .02em;
}
.card.ink-light .card__daychip { background: rgba(255,255,255,.18); }

/* flag specialty badge */
.card__flag {
  position: absolute;
  top: 8px; right: 8px;
  z-index: 3;
  font-size: 13px;
  background: rgba(0,0,0,.25);
  border-radius: 7px;
  padding: 2px 4px;
  line-height: 1;
}
.card.ink-light .card__flag { background: rgba(255,255,255,.2); }

/* rank badge on posted cards */
.card__rankbadge {
  position: absolute;
  bottom: 8px; left: 8px;
  z-index: 3;
  font-size: 11px;
  font-weight: 800;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: rgba(0,0,0,.22);
  border-radius: 999px;
  padding: 2px 7px 2px 5px;
}
.card.ink-light .card__rankbadge { background: rgba(255,255,255,.18); }

/* ---- FOIL / glow for advanced tiers -------------------------------------- */
.card.foil::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 4;
  border-radius: inherit;
  padding: 1.5px;
  background: linear-gradient(125deg,
    #fff7, #b58cff, #7af7ff, #fff7, #ffd36e, #b58cff, #fff7);
  background-size: 280% 280%;
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  pointer-events: none;
  animation: foilshift 6s linear infinite;
}
.card.foil { box-shadow: 0 0 0 1px rgba(168,85,247,.3), 0 18px 36px -16px rgba(124,58,237,.6), 0 4px 10px -4px rgba(0,0,0,.5); }
@keyframes foilshift { to { background-position: 280% 0; } }

/* nesting = extra gold ring */
.card.ring { outline: 2px solid #f5c518; outline-offset: -5px; }
.card.ring::before { background:
  radial-gradient(120% 80% at 50% 30%, rgba(255,255,255,.3), transparent 60%),
  radial-gradient(140% 100% at 50% 120%, rgba(245,197,24,.35), transparent 55%); }

/* ---- DISABLED / already-owned: fully inert ------------------------------ */
.card.is-disabled {
  filter: grayscale(.85) brightness(.7);
  opacity: .55;
  cursor: not-allowed;
  pointer-events: auto;        /* keep the element so the title tooltip works */
  transform: none !important;  /* never lifts, even if .tilt slipped through */
  box-shadow:
    0 1px 0 rgba(255,255,255,.12) inset,
    0 8px 18px -12px rgba(0,0,0,.6);
}
.card.is-disabled * { pointer-events: none; }   /* children never intercept */
.card.is-disabled:hover { transform: none !important; box-shadow:
  0 1px 0 rgba(255,255,255,.12) inset, 0 8px 18px -12px rgba(0,0,0,.6); }
.card.is-disabled.foil::after { animation: none; opacity: .4; }
.card.is-disabled .card__art,
.card.is-disabled .card__index { opacity: .9; }
/* "owned" ribbon */
.card__owned {
  position: absolute;
  z-index: 6;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) rotate(-8deg);
  background: rgba(15,20,28,.82);
  color: #fff;
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: .02em;
  text-align: center;
  line-height: 1.2;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.18);
  max-width: 84%;
  pointer-events: none;
  box-shadow: 0 6px 14px -6px rgba(0,0,0,.6);
}
.card.sm .card__owned { font-size: 9px; padding: 4px 7px; }

@media (prefers-reduced-motion: reduce) {
  .card.foil::after { animation: none; }
}

/* =================== PER-SHIFT THEMES ===================================== */
.t-earlybird { --c1:#ffe16b; --c2:#f6b73c; --ink:#4a3500; }
.t-dawn      { --c1:#7e93da; --c2:#ff9166; --ink:#241a40; }
.t-brunch    { --c1:#f7a81b; --c2:#d9630e; --ink:#3a1d00; }
.t-morning   { --c1:#ffc46b; --c2:#ff9a3c; --ink:#4a2a00; }
.t-grind     { --c1:#ff9a4d; --c2:#f4622b; --ink:#4a1a00; }
.t-golden    { --c1:#ff7a3c; --c2:#e8402b; --ink:#fff4ec; }  /* light ink */
.t-golden.ink-light, .t-golden { }
.t-dusk      { --c1:#ff7a59; --c2:#7c3fd0; --ink:#fff0ff; }  /* light ink */
.t-owl       { --c1:#3a2d72; --c2:#1c1640; --ink:#eef0ff; }  /* light ink */
.t-joker     { --c1:#6d28d9; --c2:#db2777; --ink:#fff; }      /* light ink */
.t-crown     { --c1:#ffe9a8; --c2:#f5c518; --ink:#4a3500; }
.t-blade     { --c1:#e4e9f0; --c2:#a9b4c4; --ink:#23292f; }
.t-leave     { --c1:#ecfdf5; --c2:#6ee7b7; --ink:#064e3b; }

/* leave sun glow */
.t-leave .card__art::after {
  content: "";
  position: absolute;
  top: 5%; right: 8%;
  width: 42%; aspect-ratio: 1;
  background: radial-gradient(circle, rgba(253,224,71,.65) 0%, rgba(253,224,71,.25) 45%, transparent 70%);
  z-index: 0; pointer-events: none;
  border-radius: 50%;
}

/* themes that need light ink */
.t-golden, .t-dusk, .t-owl, .t-joker { }

/* owl star field */
.t-owl .card__art::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%, #fff, transparent),
    radial-gradient(1px 1px at 70% 20%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 80% 60%, #fff, transparent),
    radial-gradient(1px 1px at 35% 70%, #fff, transparent),
    radial-gradient(1px 1px at 55% 45%, #ffe9a8, transparent),
    radial-gradient(1.5px 1.5px at 15% 80%, #fff, transparent);
  opacity: .8;
  z-index: 0;
}

/* joker wild multicolor wash */
.t-joker::before {
  background:
    conic-gradient(from 200deg at 50% 40%,
      #f97316, #db2777, #6d28d9, #2563eb, #059669, #eab308, #f97316);
  opacity: .35;
  mix-blend-mode: screen;
}

/* crown shimmer */
.t-crown .card__art::after {
  content: "";
  position: absolute; inset: -40% -10%;
  background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,.6) 50%, transparent 60%);
  animation: shimmer 4.5s ease-in-out infinite;
  z-index: 1; pointer-events: none;
}
@keyframes shimmer { 0%,100%{transform:translateX(-60%);} 50%{transform:translateX(60%);} }
@media (prefers-reduced-motion: reduce) { .t-crown .card__art::after { animation: none; } }

/* blade silver sheen */
.t-blade::before { background:
  linear-gradient(135deg, rgba(255,255,255,.6) 0%, transparent 35%, rgba(255,255,255,.35) 70%, transparent 100%); }
/* ===== components.css ===== */
/* ===========================================================================
   ShiftSwap — screen-level components
   (My Hand fan, Market rows, Post flow, Match sheet, Ledger charts, Profile)
   =========================================================================== */

/* ---- MY HAND: the fanned hand ------------------------------------------- */
.hand-fan {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 14px 0 30px;
  min-height: 250px;
  perspective: 1000px;
}
.hand-card-wrap {
  margin-inline: -30px;
  transform-origin: bottom center;
  transition: transform .28s cubic-bezier(.2,.8,.25,1);
  will-change: transform;
}
.hand-card-wrap:hover {
  z-index: 40 !important;
}
.listed-tag {
  position: absolute;
  top: 8px; left: 50%; transform: translateX(-50%);
  background: #0c1620; color: var(--gold);
  font-size: 9px; font-weight: 900; letter-spacing: .08em;
  padding: 3px 8px; border-radius: 999px; white-space: nowrap;
  border: 1px solid rgba(245,197,24,.4); z-index: 5;
}

/* ---- THE MARKET: offer rows --------------------------------------------- */
.offer-list { display: flex; flex-direction: column; gap: 10px; }
.offer-row {
  display: flex; gap: 12px; align-items: stretch;
  width: 100%; text-align: start;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 18px; padding: 11px; color: var(--ink);
  transition: transform .15s, border-color .15s, box-shadow .2s;
}
.offer-row:hover { transform: translateY(-2px); border-color: var(--line-2); }
/* already-owned offers: greyed and completely inert */
.offer-row.is-owned {
  cursor: not-allowed;
  opacity: .6;
  filter: grayscale(.4);
  background: var(--surface-2);
}
.offer-row.is-owned:hover { transform: none; border-color: var(--line); box-shadow: none; }
.offer-row.is-match {
  border-color: rgba(52,211,153,.55);
  background: linear-gradient(120deg, rgba(52,211,153,.08), var(--surface) 55%);
  box-shadow: 0 0 0 1px rgba(52,211,153,.25), 0 14px 30px -18px rgba(16,185,129,.6);
  animation: matchFloat 3.6s ease-in-out infinite;
}
@keyframes matchFloat { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-3px);} }
@media (prefers-reduced-motion: reduce) { .offer-row.is-match { animation: none; } }
.offer-note {
  font-size: 12px; font-style: italic; color: var(--ink-dim);
  line-height: 1.35; overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}

/* "Offers" eyebrow above the posted card */
.gives-tag {
  align-self: center;
  font-size: 8.5px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-faint);
}

/* the prominent "wants in return" request block */
.ask {
  display: flex; flex-direction: column; gap: 3px;
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 11px; padding: 7px 10px; margin: 1px 0 6px;
}
.offer-row.is-match .ask {
  border-color: rgba(52,211,153,.4);
  background: rgba(52,211,153,.09);
}
.ask__lead {
  font-size: 9px; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-faint);
}
.offer-row.is-match .ask__lead { color: #34d399; }
.ask__shifts { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 10px; }
.ask__shift { display: inline-flex; align-items: center; gap: 6px; }
.ask__emoji { font-size: 18px; line-height: 1; }
.ask__txt { display: inline-flex; flex-direction: column; gap: 1px; }
.ask__nm { font-weight: 800; font-size: 14px; line-height: 1.05; color: var(--ink); letter-spacing: -.01em; white-space: nowrap; }
.ask__tm {
  font-size: 10.5px; font-weight: 700; color: var(--ink-dim);
  font-variant-numeric: tabular-nums; line-height: 1; white-space: nowrap;
}
.ask__or {
  font-size: 9.5px; font-weight: 900; letter-spacing: .04em; text-transform: uppercase;
  color: var(--ink-faint); margin-inline-start: -4px;
}
.ask__day {
  font-size: 10.5px; font-weight: 700; color: var(--ink-dim);
}

/* ---- QUEUE + TRADE-KIND chrome ------------------------------------------ */
.queue-banner {
  display: flex; align-items: center; gap: 9px;
  background: linear-gradient(120deg, rgba(59,130,246,.14), var(--surface) 60%);
  border: 1px solid rgba(59,130,246,.3);
  border-radius: 14px; padding: 9px 13px; margin: 2px 0 8px;
  font-size: 12px; font-weight: 700; color: var(--ink-dim);
}
.queue-banner b { color: var(--ink); }
.queue-banner__dot {
  width: 8px; height: 8px; border-radius: 999px; flex: 0 0 auto;
  background: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.22);
}
.queue-banner__hint { font-size: 10px; font-weight: 700; color: var(--ink-faint); }
.queue-pill {
  font-size: 11px; font-weight: 800; color: var(--ink-dim);
  background: var(--surface-3); border-radius: 999px; padding: 4px 10px; white-space: nowrap;
}

.badge-double {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 900; letter-spacing: .04em;
  background: linear-gradient(120deg, #a855f7, #7c3aed); color: #fff;
  border-radius: 999px; padding: 3px 9px;
}

.double-explain { padding: 13px; display: flex; flex-direction: column; gap: 8px;
  border-color: rgba(168,85,247,.35);
  background: linear-gradient(120deg, rgba(168,85,247,.12), var(--surface) 60%); }
.double-explain__txt { margin: 0; font-size: 13px; line-height: 1.5; font-weight: 600; color: var(--ink); }
.double-explain__txt b { color: #c99bff; }

.cap-badge {
  width: max-content; margin: 6px auto 2px;
  font-size: 11px; font-weight: 800; color: #34d399;
  background: rgba(52,211,153,.12); border: 1px solid rgba(52,211,153,.35);
  border-radius: 999px; padding: 4px 12px;
}
.cap-note {
  margin-top: 10px; font-size: 11px; font-weight: 800; color: #c99bff;
  background: rgba(168,85,247,.1); border-radius: 10px; padding: 7px 10px; text-align: center;
}

/* double-trade confirm: two legs, each a give→get pair */
.double-stage { display: flex; flex-direction: column; gap: 10px; margin: 12px 0 6px; }
.double-leg { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 10px 12px; }
.double-leg__day {
  font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
  color: var(--ink-dim); margin-bottom: 8px;
}
.mini-swap { display: flex; align-items: center; gap: 10px; justify-content: center; }
.mini-swap__col { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 78px; }
.mini-swap__lbl { font-size: 9.5px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-faint); }
.mini-swap__lbl.get { color: #34d399; }
.mini-swap__arrow { font-size: 18px; font-weight: 800; color: var(--gold); }

/* profile tier ladder */
.tier-ladder { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.tier-step {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 800; color: var(--ink-faint);
  background: var(--surface-3); border-radius: 10px; padding: 6px 10px;
}
.tier-step.on { color: var(--ink); background: rgba(168,85,247,.18); box-shadow: inset 0 0 0 1px rgba(168,85,247,.4); }
.tier-step.top { color: var(--ink-dim); }
.tier-arrow { color: var(--ink-faint); font-weight: 800; }
.tier-cap { font-size: 9px; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; color: #c99bff; }

/* ---- wrapping chip rows (so all 7 days stay visible) -------------------- */
.chiprow--wrap { flex-wrap: wrap; overflow: visible; }

/* Market filter bar */
.filter-bar {
  display: flex; flex-direction: column; gap: 8px;
  margin: 6px 0 12px;
}
.filter-match-btn {
  background: var(--surface-2); border: 1.5px solid var(--line);
  color: var(--ink-dim); border-radius: 10px;
  padding: 9px 14px; font-size: 12px; font-weight: 700;
  text-align: center; transition: all .15s;
}
.filter-match-btn.active {
  background: rgba(245,197,24,.15); border-color: var(--gold);
  color: var(--gold);
}
.filter-match-btn:hover:not(.active) { border-color: var(--line-2); color: var(--ink); }
.filter-selects { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.filter-select-wrap {
  position: relative; display: flex; align-items: center;
}
.filter-select {
  width: 100%; appearance: none; -webkit-appearance: none;
  background: var(--surface-2); border: 1.5px solid var(--line);
  color: var(--ink); border-radius: 10px;
  padding: 9px 32px 9px 12px; font-size: 12px; font-weight: 700;
  font-family: var(--ui); cursor: pointer; transition: border-color .15s;
}
.filter-select:focus { outline: none; border-color: var(--gold); }
.filter-select:hover { border-color: var(--line-2); }
.filter-select option { background: #1c2e3b; color: var(--ink); }
.filter-select-arrow {
  position: absolute; right: 11px; pointer-events: none;
  color: var(--ink-faint); font-size: 11px;
}

/* same-shift-type option the agent already holds — fully inert */
.pill.pill--owned,
.pill:disabled {
  border-style: dashed;
  color: var(--ink-faint);
  opacity: .5;
  cursor: not-allowed;
  pointer-events: auto;     /* keep tooltip, but no hover/active visual change */
}
.pill.pill--owned:hover,
.pill:disabled:hover {
  color: var(--ink-faint);
  border-color: var(--line);
  background: transparent;
  transform: none;
}

/* app-bar static multilingual badge */
.lang-static {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 999px; padding: 6px 11px;
  font-size: 12px; font-weight: 800; color: var(--ink-dim);
}
.lang-static__plus { color: var(--ink-faint); }

/* ---- POST a trade -------------------------------------------------------- */
/* reminder of the card you chose to offer */
.offering-reco {
  display: flex; align-items: center; gap: 11px;
  background: linear-gradient(120deg, rgba(245,197,24,.12), var(--surface) 60%);
  border: 1px solid rgba(245,197,24,.32);
  border-radius: 16px; padding: 11px 13px; margin: 12px 0 4px;
}
.offering-reco__emoji { font-size: 26px; line-height: 1; }
.offering-reco__lbl {
  display: block; font-size: 10px; font-weight: 800; letter-spacing: .08em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 1px;
}
.offering-reco__name { font-size: 13.5px; }
.offering-reco__change {
  border: 0; background: var(--surface-3); color: var(--ink-dim);
  font-weight: 800; font-size: 11px; padding: 6px 11px; border-radius: 999px;
}
.offering-reco__change:hover { background: var(--surface-2); color: var(--ink); }

/* note / comment textarea */
.note-input {
  width: 100%; resize: none; margin-top: 4px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 11px 13px; color: var(--ink);
  font-family: var(--ui); font-size: 13px; font-weight: 600; line-height: 1.4;
}
.note-input::placeholder { color: var(--ink-faint); font-weight: 600; }
.note-input:focus { outline: none; border-color: var(--gold); }

/* ---- PROFILE: locked / fixed fields ------------------------------------- */
.lock-chip {
  font-size: 10px; font-weight: 800; color: var(--ink-faint);
  background: var(--surface-3); border-radius: 999px; padding: 2px 8px;
}
.locked-field {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 16px; padding: 4px 14px; margin-top: 2px;
  position: relative; opacity: .96;
}
.lf-row { display: flex; align-items: center; gap: 11px; padding: 12px 0; }
.lf-row .lc-flag { font-size: 22px; }
.lf-row .lc-sub { font-size: 10.5px; font-weight: 700; color: var(--ink-faint); }
.lf-divider { height: 1px; background: var(--line); }
.lf-flag-badge {
  font-size: 10px; font-weight: 800; color: var(--gold);
  border: 1px solid rgba(245,197,24,.35); border-radius: 999px; padding: 3px 9px;
}
.lock-note {
  font-size: 11.5px; font-weight: 600; color: var(--ink-faint);
  line-height: 1.45; margin: 10px 2px 0; text-align: center;
}

/* (legacy POST styles below) */
.step-h { font-family: var(--display); font-weight: 700; font-size: 20px; text-align: center; margin: 4px 0 2px; }
.step-sub { color: var(--ink-dim); text-align: center; font-size: 13px; font-weight: 600; margin: 0 0 4px; }
.flex-banner {
  width: 100%; display: flex; align-items: center; gap: 12px;
  padding: 14px; margin-top: 14px; cursor: pointer; text-align: start;
}
.mini-toggle {
  width: 44px; height: 26px; border-radius: 999px; flex: 0 0 auto;
  background: var(--surface-3); position: relative; transition: background .2s;
}
.mini-toggle > span {
  position: absolute; top: 3px; inset-inline-start: 3px;
  width: 20px; height: 20px; border-radius: 999px; background: #fff;
  transition: inset-inline-start .2s; box-shadow: 0 2px 4px rgba(0,0,0,.3);
}
.mini-toggle[data-on="true"] { background: var(--gold); }
.mini-toggle[data-on="true"] > span { inset-inline-start: 21px; }
.card-selected { outline: 3px solid var(--gold); outline-offset: 2px; border-radius: 18px; }

/* ---- MATCH sheet: merge stage ------------------------------------------- */
.merge-stage {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin: 18px 0 4px; perspective: 1000px;
}
.merge-card { width: 120px; position: relative; transition: transform .5s cubic-bezier(.4,1.3,.5,1); }
.merge-card .merge-label {
  text-align: center; font-size: 10px; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px;
}
.merge-swap { font-size: 22px; color: var(--gold); font-weight: 800; }
.merge-stage.merging .merge-card.give { transform: translateX(34px) rotateY(12deg); }
.merge-stage.merging .merge-card.get  { transform: translateX(-34px) rotateY(-12deg); }

.confirm-tick {
  margin: 8px auto 0; width: max-content;
  display: flex; align-items: center; gap: 5px;
  background: var(--surface-3); border-radius: 999px; padding: 3px 9px;
  font-size: 10px; font-weight: 800; color: var(--ink-faint);
  transition: all .25s;
}
.confirm-tick.on { background: linear-gradient(120deg,#34d399,#10b981); color: #022b1c; }
.confirm-tick .tick { font-size: 11px; }

/* sealed */
.sealed-wrap { text-align: center; padding-top: 6px; }
.sealed-burst {
  font-size: 56px; line-height: 1; margin: 6px 0 2px;
  animation: burst .55s cubic-bezier(.2,1.4,.4,1) both;
}
@keyframes burst { 0%{ transform: scale(0) rotate(-20deg); opacity: 0;} 60%{ transform: scale(1.25) rotate(6deg);} 100%{ transform: scale(1) rotate(0); opacity: 1;} }
.rtm-box {
  text-align: start; background: #0c1620; border: 1px solid var(--line-2);
  border-radius: 14px; padding: 12px 14px; margin-top: 16px;
}
.rtm-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 800; color: var(--ink-dim); margin-bottom: 8px;
}
.rtm-warn {
  font-size: 10.5px; font-weight: 800; color: #ffd36e;
  background: rgba(245,197,24,.1); border: 1px solid rgba(245,197,24,.28);
  border-radius: 8px; padding: 5px 9px; margin-bottom: 9px; letter-spacing: .01em;
}
.rtm-body {
  margin: 0; font-size: 11.5px; line-height: 1.5; font-weight: 600;
  color: var(--ink); font-family: var(--mono, ui-monospace, "SFMono-Regular", Menlo, monospace);
  white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
}

/* ---- LEDGER -------------------------------------------------------------- */
.seg {
  display: flex; gap: 4px; padding: 4px; border-radius: 14px;
  background: var(--surface); border: 1px solid var(--line); margin-top: 4px;
}
.seg button {
  flex: 1; border: 0; background: none; color: var(--ink-dim);
  font-weight: 800; font-size: 12.5px; padding: 9px; border-radius: 10px;
  transition: all .15s;
}
.seg button.on { background: var(--surface-3); color: var(--ink); }

.rank-hero { display: flex; align-items: center; gap: 14px; padding: 16px; margin-top: 6px; }
.rank-badge-xl {
  width: 64px; height: 64px; border-radius: 18px; flex: 0 0 auto;
  display: grid; place-items: center; font-size: 34px;
  background: radial-gradient(circle at 40% 30%, rgba(245,197,24,.3), var(--surface-3));
  border: 1px solid rgba(245,197,24,.3);
}

.timeline { display: flex; flex-direction: column; gap: 0; padding-inline-start: 6px; }
.tl-row { display: flex; align-items: center; gap: 12px; position: relative; padding: 6px 0; }
.tl-row::before {
  content: ""; position: absolute; inset-inline-start: 4px; top: 0; bottom: 0;
  width: 2px; background: var(--line); z-index: 0;
}
.tl-row:first-child::before { top: 50%; }
.tl-row:last-child::before { bottom: 50%; }
.tl-dot {
  width: 10px; height: 10px; border-radius: 999px; flex: 0 0 auto; z-index: 1;
  background: var(--gold); box-shadow: 0 0 0 3px rgba(245,197,24,.18);
}

.crown-index { display: flex; align-items: center; gap: 14px; padding: 16px; margin-top: 4px;
  background: linear-gradient(120deg, rgba(245,197,24,.12), var(--surface) 60%);
  border-color: rgba(245,197,24,.3); }

.heat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.heat-track {
  flex: 1; height: 16px; border-radius: 6px; overflow: hidden;
  display: flex; background: var(--table-0);
}
.heat-wanted { background: linear-gradient(90deg,#34d399,#10b981); height: 100%; }
.heat-avoided { background: linear-gradient(90deg,#f87171,#dc2626); height: 100%; opacity: .85; }
.dot { width: 9px; height: 9px; border-radius: 999px; display: inline-block; }

.vol-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
.vol-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; justify-content: flex-end; }
.vol-bar {
  width: 100%; border-radius: 6px 6px 0 0; position: relative;
  background: linear-gradient(to top, var(--gold), var(--gold-soft));
  min-height: 6px; transition: height .6s cubic-bezier(.2,.8,.25,1);
}
.vol-n { position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 800; color: var(--ink-dim); font-family: var(--display); }
.vol-x { font-size: 9.5px; font-weight: 700; color: var(--ink-faint); }

.lead-row { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 12px; }
.lead-row:hover { background: var(--surface-2); }
.lead-rank {
  width: 24px; height: 24px; border-radius: 8px; flex: 0 0 auto;
  display: grid; place-items: center; font-family: var(--display);
  font-weight: 800; font-size: 12px; background: var(--surface-3); color: var(--ink-dim);
}
.lead-rank.r0 { background: linear-gradient(150deg,#ffe9a8,#f5c518); color: #2a1d00; }
.lead-rank.r1 { background: linear-gradient(150deg,#e2e8f0,#94a3b8); color: #1a2129; }
.lead-rank.r2 { background: linear-gradient(150deg,#f0b27a,#c2783c); color: #2a1500; }

/* ---- PROFILE ------------------------------------------------------------- */
.profile-hero {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 22px 16px; text-align: center;
}
.profile-avatar {
  width: 78px; height: 78px; border-radius: 22px;
  display: grid; place-items: center; font-family: var(--display);
  font-weight: 800; font-size: 28px; color: #0c1620;
  background: linear-gradient(150deg, #cfe0ec, #93a9bb);
  box-shadow: 0 14px 30px -14px rgba(0,0,0,.7);
}
.lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.lang-card {
  display: flex; align-items: center; gap: 10px; padding: 13px;
  border-radius: 14px; background: var(--surface); border: 1px solid var(--line);
  color: var(--ink); font-weight: 800; font-size: 13px; text-align: start;
  transition: all .15s;
}
.lang-card .lc-flag { font-size: 22px; }
.lang-card.on { border-color: var(--gold); background: linear-gradient(120deg, rgba(245,197,24,.14), var(--surface) 60%); }
.lang-card .lc-sub { font-size: 10px; font-weight: 700; color: var(--ink-faint); }

/* ---- COMPLIANCE: login disclaimer modal + reminder bar ------------------ */
.disclaimer-modal {
  position: absolute; inset: 0; z-index: 85;
  background: rgba(6,10,15,.84);
  -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  display: grid; place-items: center; padding: 24px;
  animation: discFade .22s ease;
}
@keyframes discFade { from { opacity: 0; } to { opacity: 1; } }
.disclaimer-card {
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-top: 3px solid var(--gold);
  border-radius: 18px;
  padding: 24px 20px 20px;
  text-align: center;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,.85);
  animation: discPop .28s cubic-bezier(.2,.9,.3,1.1) both;
}
@keyframes discPop { from { opacity: 0; transform: translateY(10px) scale(.97); } to { opacity: 1; transform: none; } }
.disclaimer-icon { font-size: 34px; line-height: 1; }
.disclaimer-h {
  font-family: var(--display); font-weight: 700;
  font-size: 18px; line-height: 1.22; margin: 10px 0 12px; letter-spacing: -.01em;
}
.disclaimer-p {
  font-size: 13.5px; font-weight: 700; color: var(--ink-dim);
  line-height: 1.5; margin: 0 0 10px;
}
.disclaimer-p2 {

.reminder-bar {

  background: rgba(245,197,24,.13);
  border-top: 1px solid rgba(245,197,24,.4);
  border-bottom: 1px solid rgba(245,197,24,.4);

}

.reminder-bar__ic { font-size: 15px; line-height: 1.35; flex: 0 0 auto; }

/* ---- ONBOARDING: deal-your-hand ----------------------------------------- */
.deal-stage {
  position: absolute; inset: 0; z-index: 70;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 30px;
  background: radial-gradient(120% 70% at 50% 0%, #18313f 0%, var(--table-1) 50%, var(--table-0) 100%);
}
.deal-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); }
.deal-title { font-family: var(--display); font-weight: 700; font-size: 28px; margin: 2px 0 0; }
.deal-sub { color: var(--ink-dim); font-size: 13px; font-weight: 600; margin-bottom: 18px; }
.deal-fan { position: relative; width: 230px; height: 260px; }
.deal-fan .dealt {
  position: absolute; left: 50%; top: 20px; width: 120px; margin-left: -60px;
  animation: dealIn .5s cubic-bezier(.2,.9,.3,1.1) both;
}
@keyframes dealIn {
  from { opacity: 0; transform: translateY(-120px) rotate(0deg) scale(.6); }
  to   { opacity: 1; }
}
.deal-enter-btn { margin-top: 8px; animation: fadeUp .4s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  <script type="text/babel" data-presets="react">
// ===== data-supabase.jsx =====
/* ===========================================================================
   ShiftSwap: The Deck — Supabase data layer
   When window.SS_CONFIG.url + anonKey are set AND @supabase/supabase-js is
   loaded, this connects to a real Postgres backend with realtime market sync.
   Otherwise SSDB.enabled === false and the app runs on the seeded mock data in
   data.jsx, so the prototype always previews.

   Scope: DB + Realtime, demo login (no Supabase Auth). The live, realtime table
   is `trade_offers` (The Market). Agents/schedules are loaded at boot; sealed
   trades land in `trade_matches` (status pending_rtm → approved/declined).
   Exposed as window.SSDB.
   =========================================================================== */
(function () {
  const CFG = window.SS_CONFIG || {};
  const url = (CFG.url || "").trim();
  const key = (CFG.anonKey || "").trim();
  const lib = window.supabase; // UMD global from @supabase/supabase-js
  const enabled = !!(url && key && lib && lib.createClient);
  const client = enabled ? lib.createClient(url, key, { realtime: { params: { eventsPerSecond: 5 } } }) : null;

  // ---- row <-> app offer mapping ------------------------------------------
  function rowToOffer(r) {
    const o = {
      id: r.id, kind: r.kind, agent: r.agent_id, mine: !!r.mine,
      note: r.note || "", ts: r.ts || "now", status: r.status || "open",
    };
    if (r.day) o.day = r.day;
    if (r.date) o.date = r.date;
    if (r.offered) o.offered = r.offered;
    if (r.want_type) o.wantType = r.want_type;
    if (r.want_rest_day) o.wantRestDay = r.want_rest_day;
    if (r.want_rest_date) o.wantRestDate = r.want_rest_date;
    if (r.work_shift) o.workShift = r.work_shift;
    if (r.bundle_cards) o.bundleCards = r.bundle_cards;
    if (r.want_rest_days_list) o.wantRestDaysList = r.want_rest_days_list;
    return o;
  }
  function offerToRow(o) {
    return {
      id: o.id, kind: o.kind, agent_id: o.agent, mine: !!o.mine,
      day: o.day || null, date: o.date || null, offered: o.offered || null,
      want_type: o.wantType || null,
      want_rest_day: o.wantRestDay || null,
      want_rest_date: o.wantRestDate || null,
      work_shift: o.workShift || null,
      bundle_cards: o.bundleCards || null,
      want_rest_days_list: o.wantRestDaysList || null,
      note: o.note || null, ts: o.ts || "now", status: o.status || "open",
    };
  }

  // ---- boot: hydrate SS.* from the database before first render -----------
  async function fetchOpenOffers() {
    const { data, error } = await client.from("swap_offers").select("*").eq("status", "open");
    if (error) throw error;
    return (data || []).map(rowToOffer);
  }

  // rebuild SS.ROSTER / SS.ROSTER_W2 / SS.MY_HAND* from a flat schedules table
  function applySchedules(rows) {
    if (!rows || !rows.length) return;
    const SS = window.SS;
    const w1 = {}, w2 = {};
    rows.forEach(r => {
      const bucket = r.week === 2 ? w2 : w1;
      (bucket[r.agent_id] = bucket[r.agent_id] || []).push({ day: r.day, date: r.day_date, shift: r.shift });
    });
    const order = SS.DAYS.map(d => d.key);
    const sortDays = m => Object.keys(m).forEach(a => m[a].sort((x, y) => order.indexOf(x.day) - order.indexOf(y.day)));
    sortDays(w1); sortDays(w2);
    if (Object.keys(w1).length) {
      SS.ROSTER = w1;
      if (w1[SS.ME]) SS.MY_HAND = w1[SS.ME].map((c, i) => ({ id: "s" + (i + 1), agent: SS.ME, ...c }));
    }
    if (Object.keys(w2).length) {
      SS.ROSTER_W2 = w2;
      if (w2[SS.ME]) SS.MY_HAND_W2 = w2[SS.ME].map((c, i) => ({ id: "w2s" + (i + 1), agent: SS.ME, ...c }));
    }
  }

  function applyAgents(rows) {
    if (!rows || !rows.length) return;
    const SS = window.SS;
    SS.AGENTS = rows.map(a => ({
      id: a.id, name: a.name, emp: a.emp, site: a.site, team: a.team,
      tier: a.tier, lang: a.lang, trades: a.trades, flexible: !!a.flexible,
    }));
  }

  // Loads agents, schedules, and open offers into SS.* so the existing
  // synchronous screens render straight from live data. Best-effort: any
  // failure leaves the seeded mock in place.
  async function boot() {
    if (!enabled) return false;
    try {
      const [ag, sch, off] = await Promise.all([
        client.from("swap_agents").select("*"),
        client.from("swap_schedules").select("*"),
        client.from("swap_offers").select("*").eq("status", "open"),
      ]);
      if (!ag.error) applyAgents(ag.data);
      if (!sch.error) applySchedules(sch.data);
      if (!off.error && off.data && off.data.length) {
        window.SS.OFFERS = off.data.map(rowToOffer);
      }
      console.info("[SSDB] connected — live Supabase backend");
      return true;
    } catch (e) {
      console.warn("[SSDB] boot failed, falling back to mock data:", e.message || e);
      return false;
    }
  }

  // ---- realtime: re-emit the full open board on any change ----------------
  function subscribeOffers(cb) {
    if (!enabled) return () => {};
    const refresh = async () => { try { cb(await fetchOpenOffers()); } catch (e) {} };
    const ch = client
      .channel("ss-offers")
      .on("postgres_changes", { event: "*", schema: "public", table: "swap_offers" }, refresh)
      .subscribe();
    return () => { try { client.removeChannel(ch); } catch (e) {} };
  }

  // ---- writes (fire-and-forget; realtime reconciles local optimistic state)
  function insertOffer(o) {
    if (!enabled) return;
    client.from("swap_offers").insert(offerToRow(o)).then(({ error }) => {
      if (error) console.warn("[SSDB] insertOffer:", error.message);
    });
  }
  function removeOffer(id) {
    if (!enabled) return;
    client.from("swap_offers").update({ status: "matched" }).eq("id", id).then(({ error }) => {
      if (error) console.warn("[SSDB] removeOffer:", error.message);
    });
  }
  function reopenOffer(o) {
    if (!enabled) return;
    // restore to the board: upsert keeps it idempotent if the row still exists
    client.from("swap_offers").upsert({ ...offerToRow(o), status: "open" }).then(({ error }) => {
      if (error) console.warn("[SSDB] reopenOffer:", error.message);
    });
  }
  function insertMatch(entry) {
    if (!enabled) return;
    client.from("swap_matches").insert({
      id: entry.id,
      offer_id: entry.offer && entry.offer.id,
      offer: entry.offer || null,
      my_card: entry.myCard || null,
      bundle_legs: entry.bundleLegs || null,
      responder_agent_id: window.SS.ME,
      sealed_at: entry.sealedAt || null,
      rtm_msg: entry.rtmMsg || null,
      status: "pending_rtm",
    }).then(({ error }) => { if (error) console.warn("[SSDB] insertMatch:", error.message); });
  }
  function resolveMatch(id, status) {
    if (!enabled) return;
    client.from("swap_matches").update({ status }).eq("id", id).then(({ error }) => {
      if (error) console.warn("[SSDB] resolveMatch:", error.message);
    });
  }

  // ---- admin schedule import → persist to the schedules table -------------
  function upsertSchedules(schedule) {
    if (!enabled || !schedule) return;
    const rows = [];
    const push = (week, map) => Object.entries(map || {}).forEach(([agentId, days]) =>
      (days || []).forEach(d => rows.push({
        id: `${agentId}-w${week}-${d.day}`, agent_id: agentId, week,
        day: d.day, day_date: d.date, shift: d.shift,
      })));
    push(1, schedule.w1); push(2, schedule.w2);
    if (!rows.length) return;
    client.from("swap_schedules").upsert(rows).then(({ error }) => {
      if (error) console.warn("[SSDB] upsertSchedules:", error.message);
    });
  }

  window.SSDB = {
    enabled, client, boot, subscribeOffers,
    insertOffer, removeOffer, reopenOffer, insertMatch, resolveMatch, upsertSchedules,
    rowToOffer, offerToRow,
  };
  if (!enabled) console.info("[SSDB] no credentials — running on seeded mock data");
})();

  </script>

    );
  }

  // 3D tilt that follows the pointer
  function useTilt(enabled) {
    const ref = useRef(null);
    function move(e) {
      if (!enabled) return;
      const el = ref.current; if (!el) return;
      const r = el.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width - 0.5;
      const py = (e.clientY - r.top) / r.height - 0.5;
      el.style.transform =
        `translateY(-6px) rotateX(${(-py * 10).toFixed(2)}deg) rotateY(${(px * 12).toFixed(2)}deg) scale(1.03)`;
    }
    function leave() {
      const el = ref.current; if (el) el.style.transform = "";
    }
    return { ref, onMouseMove: move, onMouseLeave: leave };
  }

  /* props:
     shiftKey, day, date, size ('sm'|undefined), tilt (bool),
     tierKey, lang (for flag), trades (rank badge),
     disabled (greyed, non-interactive + tooltip), onClick, className, style */
  function ShiftCard(props) {
    const {
      shiftKey, day, date, size, tilt = true, tierKey, lang = "EN",
      langSpec, trades, onClick, className = "", style, showRank,
      disabled = false, disabledTip = "You already have this shift",
    } = props;
    const sh = SS.shift(shiftKey);
    if (!sh) return null;
    const tier = tierKey ? SS.tier(tierKey) : null;
    const light = LIGHT_INK[sh.theme];
    // disabled cards never tilt and never respond to the pointer
    const tiltProps = useTilt(tilt && !size && !disabled);

    const name = lang === "AR" ? sh.ar : sh.name;
    const timeLabel = SS.timeText(shiftKey);

    const cls = [
      "card", `t-${sh.theme}`,
      light ? "ink-light" : "",
      size === "sm" ? "sm" : "",
      tilt && !size && !disabled ? "tilt" : "",
      tier && tier.foil ? "foil" : "",
      tier && tier.ring ? "ring" : "",
      disabled ? "is-disabled" : "",
      className,
    ].filter(Boolean).join(" ");

    return (
      <div className={cls} style={style}
           onClick={disabled ? undefined : onClick}
           aria-disabled={disabled || undefined}
           title={disabled ? disabledTip : undefined}
           ref={tiltProps.ref} onMouseMove={tiltProps.onMouseMove} onMouseLeave={tiltProps.onMouseLeave}>
        {/* index corners */}
        <div className="card__index tl"><span className="ix-emoji">{sh.emoji}</span><span>{sh.code}</span></div>
        <div className="card__index br"><span className="ix-emoji">{sh.emoji}</span><span>{sh.code}</span></div>

        {tierKey && <FlagBadge tierKey={tierKey} lang={langSpec} />}
        {showRank && typeof trades === "number" && <RankBadge trades={trades} small />}

        <div className="card__top">
          {/* name + time always travel together — name is flavor, time is truth */}
          <div className="card__namewrap">
            <div className="card__name"><span className="card__nameemoji">{sh.emoji}</span>{name}</div>
            <div className="card__nametime">{timeLabel}</div>
          </div>
          {tierKey && <TierPip tierKey={tierKey} />}
        </div>

        <div className="card__art">
          <span className="card__watermark">{sh.emoji}</span>
          <span className="card__emoji">{sh.emoji}</span>
        </div>

        <div className="card__bottom">
          <div className="card__meta">
            {day && <span className="card__daychip">{day}</span>}
            {date && <span style={{ opacity: .8 }}>{date}</span>}
          </div>
        </div>

        {disabled && <div className="card__owned">{disabledTip}</div>}
      </div>
    );
  }

  // Inline shift name + time label — use wherever a shift name appears as plain text
  function ShiftNameTime({ shiftKey, lang = "EN", size }) {
    const sh = SS.shift(shiftKey);
    if (!sh) return null;
    const name = lang === "AR" ? sh.ar : sh.name;
    const fs = size === "sm" ? ".72em" : ".78em";
    return (
      <span style={{ display: "inline-flex", flexDirection: "column", gap: 1, verticalAlign: "top" }}>
        <span>{name}</span>
        <span style={{ fontSize: fs, opacity: .55, fontWeight: 600, letterSpacing: ".01em" }}>{SS.timeText(shiftKey)}</span>
      </span>
    );
  }

  Object.assign(window, { ShiftCard, RankBadge, FlagBadge, TierPip, ShiftNameTime });
})();

  </script>

          <span className="count">{displayCards.length} {t("shifts")} · {restDays} {t("restDays")}</span>
        </div>

        <div className="hand-fan">
          {displayCards.map((c, i) => {
            const mid = (displayCards.length - 1) / 2;
            const rot = (i - mid) * 2.6;
            const ty = Math.abs(i - mid) * 5;
            const lift = pulled === i ? 22 : 0;
            const listed = listedIds.includes(c.id);
            const canTrade = true;
            return (
              <div key={c.id} className="hand-card-wrap"
                   style={{ transform: `rotate(${rot}deg) translateY(${ty - lift}px)${lift ? " scale(1.05)" : ""}`, zIndex: pulled === i ? 30 : 10 }}
                   onMouseEnter={() => setPulled(i)} onMouseLeave={() => setPulled(null)}>
                <div style={{ width: 104, opacity: listed ? .55 : 1, position: "relative" }}>
                  <window.ShiftCard shiftKey={c.shift} day={lang === "AR" ? null : c.day} date={c.date}
                    tierKey={me.tier} lang={lang} langSpec={me.lang}
                    onClick={() => openCard(c)} />
                  {listed && <div className="listed-tag">{t("live")} ●</div>}
                </div>
              </div>
            );
          })}
        </div>

        {/* rank progress */}
        {next && (
          <div className="glass" style={{ padding: 14, marginTop: 22 }}>
            <div className="row between" style={{ marginBottom: 8 }}>
              <div style={{ fontWeight: 800, fontSize: 13 }}>{rank.badge} {lang === "AR" ? rank.ar : rank.name}</div>
              <div className="faint" style={{ fontSize: 12, fontWeight: 700 }}>
                {next.min - trades} {t("trades")} {t("toNext")} {next.badge}
              </div>
            </div>
            <div style={{ height: 8, borderRadius: 999, background: "var(--surface-3)", overflow: "hidden" }}>
              <div style={{
                height: "100%", borderRadius: 999,
                width: `${Math.min(100, ((trades - rank.min) / (next.min - rank.min)) * 100)}%`,
                background: "linear-gradient(90deg, var(--gold-soft), var(--gold))",
              }} />
            </div>
          </div>
        )}

        <p className="faint" style={{ textAlign: "center", fontSize: 11, fontWeight: 600, marginTop: 18 }}>
          {lang === "AR" ? "اضغط على بطاقة لعرضها للتبديل" : "Tap any card to put it up for trade"}
        </p>

        <ScavengeProposalSection proposals={scavengeProposals} onAccept={acceptScavengeProposal} onDecline={declineScavengeProposal} lang={lang} />
        <PendingRtmSection pending={pendingRtm} onApprove={approveRtm} onDecline={declineRtm} lang={lang} />
      </div>
    );
  }

  window.MyHand = MyHand;
})();
