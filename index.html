          </div>
          {isBundle ? (
            <div style={{ fontSize: 11.5, fontWeight: 700, color: "var(--ink-dim)", marginBottom: 5, display: "flex", flexWrap: "wrap", alignItems: "center", gap: "2px 6px" }}>
              <span className="badge-double">📦 {offer.bundleCards.length}-DAY BUNDLE</span>
              <span>{offer.bundleCards.map(bc => bc.day).join(" + ")}</span>
              {offer.wantType && offer.wantType.length > 0 && <>
                <span className="faint">· wants</span>
                {offer.wantType.map((w, wi) => (
                  <span key={w} style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
                    {wi > 0 && <span style={{ opacity: .35 }}>/</span>}
                    <window.ShiftNameTime shiftKey={w} lang={lang} size="sm" />
                  </span>
                ))}
                <span className="faint">each day</span>
              </>}
            </div>
          ) : isRestBundle ? (
            <div style={{ fontSize: 11.5, fontWeight: 700, color: "var(--ink-dim)", marginBottom: 5, display: "flex", flexWrap: "wrap", alignItems: "center", gap: "3px 6px" }}>
              <span className="badge-double">👑 MULTI REST SWAP</span>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 5 }}>
                <span style={{ opacity: .55 }}>{offer.bundleCards?.map(bc => `👑 ${bc.day}`).join(" + ")}</span>
                <span style={{ opacity: .3, fontSize: 11 }}>→</span>
                <span style={{ color: "var(--ink)" }}>{(offer.wantRestDaysList || []).map(d => `👑 ${d}`).join(" + ")}</span>
              </span>
            </div>
          ) : isRest ? (
            <div style={{ fontSize: 11.5, fontWeight: 700, color: "var(--ink-dim)", marginBottom: 5, display: "flex", flexWrap: "wrap", alignItems: "center", gap: "3px 6px" }}>
              <span className="badge-double">👑 DAY OFF SWAP</span>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 5 }}>
                <span style={{ opacity: .5 }}>👑 {offer.day}</span>
                <span style={{ opacity: .3, fontSize: 11 }}>→</span>
                <span style={{ color: "var(--ink)" }}>👑 {offer.wantRestDay}</span>
              </span>
            </div>
          ) : (
            <div className="ask">
              <span className="ask__lead">{lang === "AR" ? "يطلب بالمقابل" : "Wants in return"}</span>
              <div className="ask__shifts">
                {offer.wantType.map((w, i) => {
                  const sh = SS.shift(w);
                  return (
                    <span key={w} className="ask__shift">
                      {i > 0 && <span className="ask__or">{lang === "AR" ? "أو" : "or"}</span>}
                      <span className="ask__emoji">{sh.emoji}</span>
                      <span className="ask__txt">
                        <span className="ask__nm">{lang === "AR" ? sh.ar : sh.name}</span>
                        <span className="ask__tm">{SS.timeText(w)}</span>
                      </span>
                    </span>
                  );
                })}
              </div>
              <span className="ask__day">{lang === "AR" ? "نفس اليوم" : "Same day"} · {offer.day} {offer.date}</span>
            </div>
          )}
          <div className="offer-note">“{offer.note}”</div>
          <div className="faint" style={{ fontSize: 10, fontWeight: 700, marginTop: 5 }}>
            {offer.ts} {lang === "AR" ? "مضت" : "ago"} · {offer.day} {offer.date}
            {offer.mine && <span style={{ color: "var(--gold)" }}> · {t("live")} ● {lang==="AR"?"عرضك":"yours"}</span>}
          </div>
        </div>
      </button>
    );
  }

  function Market() {
    const app = React.useContext(window.SSCtx);
    const { t, lang, offers, openOffer, handCards, listedIds } = app;
    const SS = window.SS;
    const me = SS.agent(SS.ME);

    const [dayF, setDayF] = useState("ALL");
    const [shiftF, setShiftF] = useState("ALL");
    const [matchOnly, setMatchOnly] = useState(false);
    const [mode, setMode] = useState("board"); // "board" | "scavenge"

    // my available hand
    const avail = useMemo(() =>
      handCards.filter(c => !listedIds.includes(c.id)),
      [handCards, listedIds]);

    // I can only fulfil an offer if I'm in the same queue (tier + language).
    function isMatch(o) {
      if (o.mine || isOwned(o)) return false;
      const poster = SS.agent(o.agent);
      if (!SS.sameQueue(me, poster)) return false;
      if (o.kind === "bundle") {
        if (!o.wantType || !o.bundleCards) return false;
        return o.bundleCards.every(bc =>
          avail.some(c => c.day === bc.day && o.wantType.includes(c.shift))
        );
      }
      if (o.kind === "rest") {
        // rest-day double trade: I must currently REST on the day they want off,
        // and WORK on the day they're giving up — so we can swap both days.
        const iRestOnWanted = avail.some(c => c.day === o.wantRestDay && c.shift === "CROWN");
        const iWorkTheirRest = avail.some(c => c.day === o.day && c.shift !== "CROWN");
        return iRestOnWanted && iWorkTheirRest;
      }
      if (o.kind === "rest-bundle") {
        const iRestOnAll = (o.wantRestDaysList || []).every(d => avail.some(c => c.day === d && c.shift === "CROWN"));
        const iWorkOnAll = (o.bundleCards || []).every(bc => avail.some(c => c.day === bc.day && c.shift !== "CROWN"));
        return iRestOnAll && iWorkOnAll;
      }
      // same-day time swap: I hold a working card on THAT day of a type they want.
      return avail.some(c => c.day === o.day && c.shift !== "CROWN" && o.wantType.includes(c.shift));
    }

    // "Owned" = I already hold this exact shift on that same day, so taking it
    // would be pointless. These cards are greyed out and non-interactive.
    function isOwned(o) {
      if (o.mine || o.kind === "rest" || o.kind === "bundle" || o.kind === "rest-bundle") return false;
      return avail.some(c => c.day === o.day && c.shift === o.offered);
    }

    // The market only ever shows offers from MY queue.
    const queueOffers = offers.filter(o => o.mine || SS.sameQueue(me, SS.agent(o.agent)));

    const visible = queueOffers.filter(o => {
      if (o.kind === "bundle" || o.kind === "rest-bundle") {
        if (matchOnly && !isMatch(o)) return false;
        return true;
      }
      if (dayF !== "ALL" && o.day !== dayF) return false;
      if (shiftF !== "ALL" && o.offered !== shiftF) return false;
      if (matchOnly && !isMatch(o)) return false;
      return true;
    });
    const ranked = [...visible].sort((a, b) => {
      const am = isMatch(a) ? 1 : 0, bm = isMatch(b) ? 1 : 0;
      if (am !== bm) return bm - am;
      const ao = isOwned(a) ? 1 : 0, bo = isOwned(b) ? 1 : 0;
      if (ao !== bo) return ao - bo;   // owned (inert) sink to the bottom
      return 0;
    });
    const matches = ranked.filter(isMatch);
    const rest = ranked.filter(o => !isMatch(o));

    const days = ["ALL", ...SS.DAYS.map(d => d.key)];
    const shiftKeys = ["ALL", "CROWN", "GRIND", "GOLDEN", "OWL", "EARLY", "MORNING", "DUSK"];

    return (
      <div className="screen-enter">
        {/* Board / Scavenge tab toggle */}
        <div className="seg" style={{ marginBottom: 10 }}>
          <button className={mode === "board" ? "on" : ""} onClick={() => setMode("board")}>📋 Board</button>
          <button className={mode === "scavenge" ? "on" : ""} onClick={() => setMode("scavenge")}>🔦 Scavenge</button>
        </div>

        {mode === "scavenge" && <window.Scavenge />}
        {mode === "board" && <>
        {/* queue banner — you only trade inside your own tier + language */}
        <div className="queue-banner">
          <span className="queue-banner__dot" />
          <span style={{ flex: 1 }}>
            <b>Your queue</b> · {SS.tier(me.tier).label} · {SS.FLAGS[me.lang]} {SS.LANG_NAMES[me.lang]}
          </span>
          <span className="queue-banner__hint">trades stay in-queue</span>
        </div>

        {/* filters */}
        <div className="filter-bar">
          <button
            className={"filter-match-btn" + (matchOnly ? " active" : "")}
            onClick={() => setMatchOnly(m => !m)}>
            ★ {t("matchesForYou")}
          </button>
          <div className="filter-selects">
            <div className="filter-select-wrap">
              <select
                className="filter-select"
                value={dayF}
                onChange={e => setDayF(e.target.value)}>
                <option value="ALL">{t("allDays")}</option>
                {SS.DAYS.map(d => (
                  <option key={d.key} value={d.key}>{d.key} · {d.date}</option>
                ))}
              </select>
              <span className="filter-select-arrow">▾</span>
            </div>
            <div className="filter-select-wrap">
              <select
                className="filter-select"
                value={shiftF}
                onChange={e => setShiftF(e.target.value)}>
                <option value="ALL">{t("allShifts")}</option>
                {shiftKeys.filter(s => s !== "ALL").map(s => (
                  <option key={s} value={s}>{SS.shift(s).emoji} {SS.shift(s).name} · {SS.timeText(s)}</option>
                ))}
              </select>
              <span className="filter-select-arrow">▾</span>
            </div>
          </div>
        </div>

        {matches.length > 0 && (
          <>
            <div className="section-label"><span>★ {t("matchesForYou")}</span><span className="count">{matches.length}</span></div>
            <div className="offer-list">
              {matches.map(o => <MarketCardRow key={o.id} offer={o} isMatch={true} owned={false} onOpen={openOffer} lang={lang} />)}
            </div>
          </>
        )}

        <div className="section-label"><span>{t("otherOffers")}</span><span className="count">{rest.length}</span></div>
        <div className="offer-list">
          {rest.map(o => <MarketCardRow key={o.id} offer={o} isMatch={false} owned={isOwned(o)} onOpen={openOffer} lang={lang} />)}
        </div>
        {ranked.length === 0 && (
          <div className="faint" style={{ textAlign: "center", padding: 40, fontWeight: 700 }}>
            {lang === "AR" ? "لا عروض مطابقة للتصفية" : "No offers match these filters"}
          </div>
        )}
        </>}
      </div>
    );
  }

  window.Market = Market;
})();

  </script>
  <script type="text/babel" data-presets="react">
// ===== screen-scavenge.jsx =====
/* ===========================================================================
   ShiftSwap — Scavenge (proactive trade hunting)
   Lets an agent find who holds a wanted shift on a given day,
   even if that person hasn't posted an offer yet.
   =========================================================================== */
(function () {
  const { useState } = React;

  /* --- Single result row -------------------------------------------------- */
  function ScavengeRow({ agent, dayEntry, wantDay, proposed, onPropose, lang }) {
    const SS = window.SS;
    const sent = proposed.has(agent.id);
    return (
      <div className="offer-row" style={{ cursor: "default", alignItems: "flex-start" }}>
        <div style={{ width: 80, flex: "0 0 auto" }}>
          <window.ShiftCard shiftKey={dayEntry.shift} size="sm" tilt={false}
            tierKey={agent.tier} lang={lang} langSpec={agent.lang} />
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="row" style={{ gap: 7, marginBottom: 5 }}>
            <div className="avatar sm">{SS.initials(agent.name)}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 800, fontSize: 12.5, lineHeight: 1.1 }}>{agent.name}</div>
              <div className="faint" style={{ fontSize: 10, fontWeight: 700 }}>
                {SS.rankFor(agent.trades).badge} {agent.site}
              </div>
            </div>
            <span className="queue-pill">{SS.tier(agent.tier).label} · {SS.FLAGS[agent.lang]}</span>
          </div>

          <div style={{ fontSize: 11.5, fontWeight: 700, marginBottom: 8, display: "flex", flexWrap: "wrap", gap: "2px 5px", alignItems: "flex-start" }}>
            <span className="faint" style={{ alignSelf: "center" }}>Has</span>
            <window.ShiftNameTime shiftKey={dayEntry.shift} size="sm" />
            <span className="faint" style={{ alignSelf: "center" }}>on {wantDay}</span>
          </div>

          <button
            className={"btn " + (sent ? "btn--ghost" : "btn--gold")}
            style={{ width: "100%", fontSize: 11.5, padding: "9px 8px", opacity: sent ? .65 : 1 }}
            disabled={sent}
            onClick={() => onPropose(agent.id, dayEntry)}>
            {sent ? "✓ Proposal sent" : "📤 Propose trade"}
          </button>
          {sent && (
            <div className="faint" style={{ fontSize: 10, fontWeight: 700, marginTop: 5, textAlign: "center" }}>
              They'll see a nudge to check the market
            </div>
          )}
        </div>
      </div>
    );
  }

  /* --- Main Scavenge component -------------------------------------------- */
  function Scavenge() {
    const app  = React.useContext(window.SSCtx);
    const { lang, handCards, sendScavengeProposal } = app;
    const SS   = window.SS;
    const me   = SS.agent(SS.ME);

    const [myCardId, setMyCardId] = useState(null);
    const [wantDay,  setWantDay]  = useState(null);
    const [wantShift,setWantShift]= useState(null);
    const [results,  setResults]  = useState(null); // null = not yet searched
    const [proposed, setProposed] = useState(new Set());

    const myCard = handCards.find(c => c.id === myCardId);
    const shiftOpts = ["EARLY","MORNING","GRIND","GOLDEN","DUSK","OWL","CROWN"];

    function pickCard(c) {
      setMyCardId(c.id);
      setWantDay(c.day);   // default same day
      setWantShift(null);
      setResults(null);
    }

    function doScavenge() {
      const hits = [];
      Object.entries(SS.ROSTER).forEach(([aid, sched]) => {
        if (aid === SS.ME) return;
        const ag = SS.agent(aid);
        if (!ag || !SS.sameQueue(me, ag)) return;
        const match = sched.find(s => s.day === wantDay && s.shift === wantShift);
        if (match) hits.push({ agent: ag, dayEntry: match });
      });
      setResults(hits);
    }

    function propose(agentId, dayEntry) {
      setProposed(s => new Set([...s, agentId]));
      sendScavengeProposal({
        fromAgentId: SS.ME,
        toAgentId: agentId,
        fromCard: { ...myCard },
        toShift: dayEntry.shift,
        toDay: wantDay,
        toDate: dayEntry.date,
      });
    }

    const canScavenge = !!(myCard && wantShift && wantDay);

    return (
      <div className="screen-enter" style={{ paddingTop: 4 }}>

        {/* Intro */}
        <div className="glass" style={{ padding: 12, marginBottom: 14, display: "flex", gap: 10, alignItems: "flex-start" }}>
          <span style={{ fontSize: 20 }}>🔦</span>
          <div>
            <div style={{ fontWeight: 800, fontSize: 12.5 }}>Proactive hunting</div>
            <div className="faint" style={{ fontSize: 11.5, fontWeight: 600, marginTop: 2 }}>
              Find who holds the shift you want — even if they haven't posted yet.
              Only shows agents in your queue.
            </div>
          </div>
        </div>

        {/* Step 1 — pick my card */}
        <div className="section-label"><span>1 · Which card are you trading?</span></div>
        <div className="grid2" style={{ marginTop: 8, marginBottom: 4 }}>
          {handCards.map(c => (
            <div key={c.id} onClick={() => pickCard(c)}
                 style={{ cursor: "pointer", transform: myCardId === c.id ? "scale(.97)" : "none", transition: "transform .15s" }}>
              <window.ShiftCard shiftKey={c.shift}
                day={lang === "AR" ? null : c.day} date={c.date}
                tierKey={me.tier} lang={lang} langSpec={me.lang} tilt={false}
                className={myCardId === c.id ? "card-selected" : ""} />
            </div>
          ))}
        </div>

        {/* Step 2 — what do I want */}
        {myCard && (
          <>
            <div className="section-label" style={{ marginTop: 20 }}>
              <span>2 · What do you want back?</span>
            </div>

            <div className="faint" style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".07em", textTransform: "uppercase", marginBottom: 5 }}>
              On which day
            </div>
            <div className="chiprow chiprow--wrap" style={{ marginBottom: 14 }}>
              {SS.DAYS.map(d => (
                <button key={d.key}
                  className={"pill" + (wantDay === d.key ? " active" : "")}
                  onClick={() => { setWantDay(d.key); setResults(null); }}>
                  {d.key} · {d.date}
                </button>
              ))}
            </div>

            <div className="faint" style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".07em", textTransform: "uppercase", marginBottom: 5 }}>
              Which shift
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
              {shiftOpts.map(k => {
                const same = k === myCard.shift && wantDay === myCard.day;
                return (
                  <button key={k}
                    className={"pill" + (wantShift === k ? " active" : "") + (same ? " pill--owned" : "")}
                    onClick={same ? undefined : () => { setWantShift(k); setResults(null); }}
                    aria-disabled={same || undefined}
                    title={same ? "That's already your shift" : undefined}>
                    <span style={{ display: "inline-flex", flexDirection: "column", gap: 1, lineHeight: 1.3, textAlign: "start" }}>
                      <span>{SS.shift(k).emoji} {SS.shift(k).name}</span>
                      <span style={{ fontSize: ".73em", opacity: .55, fontWeight: 600 }}>{SS.timeText(k)}</span>
                    </span>
                  </button>
                );
              })}
            </div>

            <button className="btn btn--gold btn--full"
              disabled={!canScavenge}
              style={{ opacity: canScavenge ? 1 : .45 }}
              onClick={doScavenge}>
              🔍 Scavenge
            </button>
          </>
        )}

        {/* Results */}
        {results !== null && (
          <>
            <div className="section-label" style={{ marginTop: 22 }}>
              <span>{SS.shift(wantShift).emoji} {SS.shift(wantShift).name} · {wantDay}</span>
              <span className="count">{results.length} in your queue</span>
            </div>

            {results.length === 0 ? (
              <div className="glass" style={{ padding: 24, textAlign: "center" }}>
                <div style={{ fontSize: 26, marginBottom: 8 }}>🌑</div>
                <div style={{ fontWeight: 800, fontSize: 13 }}>Nobody in your queue has this</div>
                <div className="faint" style={{ fontSize: 11.5, fontWeight: 600, marginTop: 4 }}>
                  Try a different shift or day.
                </div>
              </div>
            ) : (
              <div className="offer-list">
                {results.map(({ agent, dayEntry }) => (
                  <ScavengeRow key={agent.id}
                    agent={agent} dayEntry={dayEntry} wantDay={wantDay}
                    proposed={proposed} onPropose={propose} lang={lang} />
                ))}
              </div>
            )}
          </>
        )}
      </div>
    );
  }

  window.Scavenge = Scavenge;
})();

  </script>
  <script type="text/babel" data-presets="react">
// ===== screen-post.jsx =====
/* ===========================================================================
   ShiftSwap — Post a Trade (unified, 3 steps)
   Kind auto-detected from selection:
     1 working shift   → time swap
     2+ working shifts → bundle
     1 Crown           → day off swap
     2+ Crowns         → multi-rest swap
   =========================================================================== */
(function () {
  const { useState } = React;

  function StepDots({ step }) {
    return (
      <div className="row" style={{ gap: 6, justifyContent: "center", margin: "2px 0 14px" }}>
        {[1, 2, 3].map(n => (
          <div key={n} style={{
            height: 5, borderRadius: 999, transition: "all .25s",
            width: n === step ? 26 : 16,
            background: n <= step ? "var(--gold)" : "var(--surface-3)",
          }} />
        ))}
      </div>
    );
  }

  const KIND_META = {
    time:          { icon: "⇄",  label: "Time Swap",           color: "#60a5fa" },
    bundle:        { icon: "📦", label: "Bundle",               color: "#f5c518" },
    rest:          { icon: "👑", label: "Day Off Swap",         color: "#a78bfa" },
    "rest-bundle": { icon: "👑", label: "Multi Rest Swap",      color: "#a78bfa" },
    mixed:         { icon: "⚠️", label: "Mixed — one type only", color: "#ef4444" },
  };

  function PostTrade() {
    const app = React.useContext(window.SSCtx);
    const { t, lang, handCards, listedIds, postOffer, postPreselect, clearPreselect } = app;
    const SS = window.SS;
    const me = SS.agent(SS.ME);
    const handCardsW2 = app.handCardsW2 || [];
    const allCards = [...handCards, ...handCardsW2];
    const available = allCards.filter(c => !listedIds.includes(c.id));
    const bundlePreselect = app.bundlePreselect || null;

    const initIds = () => {
      if (bundlePreselect) return new Set(bundlePreselect);
      if (postPreselect)   return new Set([postPreselect]);
      return new Set();
    };
    const [step, setStep]   = useState(() => (postPreselect || bundlePreselect) ? 2 : 1);
    const [selectedIds, setSelectedIds] = useState(initIds);
    const [wantTypes,   setWantTypes]  = useState([]);
    const [wantRestDay, setWantRestDay] = useState(null);
    const [wantRestDaysMap, setWantRestDaysMap] = useState({}); // { cardId: targetDay }
    const [flex, setFlex] = useState(false);
    const [note, setNote] = useState("Looking to swap this one.");
    const timeOptions = ["EARLY", "MORNING", "GRIND", "GOLDEN", "DUSK", "OWL"];

    // ── Derived from selectedIds ──────────────────────────────────────────────
    const selectedCards  = [...selectedIds].map(id => allCards.find(c => c.id === id)).filter(Boolean);
    const selectedCrowns = selectedCards.filter(c => c.shift === "CROWN");
    const selectedWork   = selectedCards.filter(c => c.shift !== "CROWN");
    const hasMix = selectedCrowns.length > 0 && selectedWork.length > 0;
    const detectedKind   = hasMix ? "mixed"
      : selectedWork.length === 1   ? "time"
      : selectedWork.length > 1     ? "bundle"
      : selectedCrowns.length === 1 ? "rest"
      : selectedCrowns.length > 1   ? "rest-bundle"
      : null;

    const card        = selectedCards[0] || null;
    const isTime      = detectedKind === "time";
    const isRest      = detectedKind === "rest";
    const isBundle    = detectedKind === "bundle";
    const isRestBundle = detectedKind === "rest-bundle";

    // for single rest swap
    const myWorkDays    = allCards.filter(c => c.shift !== "CROWN" && c.day !== (card && card.day));
    const targetRestCard = wantRestDay ? myWorkDays.find(c => c.day === wantRestDay) : null;

    // for rest-bundle: candidates for each Crown (exclude already picked + same day)
    function restBundleTargets(crownCard) {
      const taken = new Set(
        Object.entries(wantRestDaysMap)
          .filter(([id]) => id !== crownCard.id)
          .map(([, d]) => d)
      );
      return allCards.filter(c => c.shift !== "CROWN" && !taken.has(c.day) && c.day !== crownCard.day);
    }

    const step2Ready = isRest ? !!wantRestDay
      : isRestBundle ? selectedCrowns.every(c => wantRestDaysMap[c.id])
      : isBundle     ? wantTypes.length > 0
      : isTime       ? (flex || wantTypes.length > 0)
      : false;

    function toggleCard(c) {
      setSelectedIds(prev => {
        const n = new Set(prev);
        n.has(c.id) ? n.delete(c.id) : n.add(c.id);
        return n;
      });
      setWantTypes([]); setWantRestDay(null); setWantRestDaysMap({}); setFlex(false);
    }

    function submit() {
      if (isBundle) {
        postOffer({ kind: "bundle", bundleCardIds: [...selectedIds], wantTypes, note });
        if (app.clearBundlePreselect) app.clearBundlePreselect();
      } else if (isRestBundle) {
        const wantRestDaysList = selectedCrowns.map(c => wantRestDaysMap[c.id]);
        postOffer({ kind: "rest-bundle", bundleCardIds: [...selectedIds], wantRestDaysList, note });
      } else if (isRest && card) {
        postOffer({ cardId: card.id, wantRestDay, note });
      } else if (isTime && card) {
        postOffer({ cardId: card.id, wantTypes: flex ? timeOptions : wantTypes, flex, note });
      }
      clearPreselect();
    }

    return (
      <div className="screen-enter">
        <div className="faint" style={{ fontSize: 11, fontWeight: 800, letterSpacing: ".1em", textTransform: "uppercase", textAlign: "center" }}>
          {t("step")} {step} / 3
        </div>
        <StepDots step={step} />

        {/* ================================================================
            STEP 1: unified card picker
            ================================================================ */}
        {step === 1 && (
          <div className="screen-enter">
            <h3 className="step-h">Pick your cards</h3>
            <p className="step-sub">Tap one or more — the trade type is detected automatically.</p>

            {/* Live kind indicator */}
            <div style={{ minHeight: 30, marginBottom: 8, display: "flex", justifyContent: "center", alignItems: "center" }}>
              {detectedKind && (() => {
                const m = KIND_META[detectedKind];
                const countLabel = detectedKind === "bundle" ? `${selectedCards.length}-Day Bundle`
                  : detectedKind === "rest-bundle" ? `${selectedCards.length}-Day Rest Swap`
                  : m.label;
                return (
                  <span style={{ fontSize: 11, fontWeight: 800, padding: "4px 13px", borderRadius: 999,
                    background: m.color + "18", color: m.color, border: `1px solid ${m.color}44`,
                    display: "inline-flex", alignItems: "center", gap: 5 }}>
                    {m.icon} {countLabel}
                  </span>
                );
              })()}
            </div>

            <div className="grid2" style={{ marginTop: 0 }}>
              {available.map(c => {
                const isSel = selectedIds.has(c.id);
                const wouldMix = !isSel && selectedIds.size > 0 &&
                  ((selectedCrowns.length > 0 && c.shift !== "CROWN") ||
                   (selectedWork.length > 0 && c.shift === "CROWN"));
                return (
                  <div key={c.id} onClick={() => !wouldMix && toggleCard(c)}
                    title={wouldMix ? "Can't mix rest days and working shifts" : undefined}
                    style={{ cursor: wouldMix ? "not-allowed" : "pointer", position: "relative",
                             opacity: wouldMix ? .28 : 1,
                             transform: isSel ? "scale(.97)" : "none" }}>
                    <window.ShiftCard shiftKey={c.shift} day={c.day} date={c.date}
                      tierKey={me.tier} lang={lang} langSpec={me.lang} tilt={false}
                      className={isSel ? "card-selected" : ""} />
                    {isSel && (
                      <div style={{ position: "absolute", top: 7, right: 7, zIndex: 10,
                        width: 22, height: 22, borderRadius: "50%",
                        background: "var(--gold)", color: "#2a1d00",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 13, fontWeight: 900, boxShadow: "0 2px 6px rgba(0,0,0,.35)" }}>✓</div>
                    )}
                  </div>
                );
              })}
            </div>
            {available.length === 0 && (
              <p className="faint" style={{ textAlign: "center", padding: 30 }}>All your cards are already listed</p>
            )}
            {hasMix && (
              <p style={{ fontSize: 11, fontWeight: 700, color: "#ef4444", textAlign: "center", marginTop: 8 }}>
                Can't mix rest days and working shifts — pick one type only.
              </p>
            )}
            {detectedKind && detectedKind !== "mixed" && (
              <button className="btn btn--gold btn--full" style={{ marginTop: 14 }}
                onClick={() => setStep(2)}>
                Continue →
              </button>
            )}
          </div>
        )}

        {/* ================================================================
            STEP 2: TIME SWAP
            ================================================================ */}
        {step === 2 && isTime && card && (
          <div className="screen-enter">
            <h3 className="step-h">{t("whatWant")}</h3>
            <p className="step-sub">Same day, different time — pick the shift(s) you'd take.</p>
            <div className="offering-reco">
              <span className="offering-reco__emoji">{SS.shift(card.shift).emoji}</span>
              <span style={{ flex: 1 }}>
                <span className="offering-reco__lbl">You're offering</span>
                <span className="offering-reco__name" style={{ display: "flex", flexDirection: "column", gap: 1 }}>
                  <b>{SS.shift(card.shift).name}</b>
                  <span style={{ fontSize: ".8em", opacity: .6, fontWeight: 600 }}>{SS.timeText(card.shift)} · {card.day} {card.date}</span>
                </span>
              </span>
              <button className="offering-reco__change" onClick={() => setStep(1)}>Change</button>
            </div>
            <button className="glass flex-banner" onClick={() => setFlex(f => !f)}
              style={{ borderColor: flex ? "var(--gold)" : "var(--line)" }}>
              <span style={{ fontSize: 20 }}>🖐️</span>
              <span style={{ flex: 1, textAlign: "start" }}>
                <b style={{ fontSize: 13 }}>Any time this day</b>
                <span className="faint" style={{ display: "block", fontSize: 11, fontWeight: 600 }}>I'll take any {card.day} shift</span>
              </span>
              <span className="mini-toggle" data-on={flex}><span /></span>
            </button>
            {!flex && (
              <>
                <div className="section-label" style={{ marginTop: 16 }}>Times you'd take · {card.day}</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {timeOptions.map(k => {
                    const same = k === card.shift;
                    return (
                      <button key={k}
                        className={"pill" + (wantTypes.includes(k) ? " active" : "") + (same ? " pill--owned" : "")}
                        onClick={same ? undefined : () => setWantTypes(w => w.includes(k) ? w.filter(x => x !== k) : [...w, k])}
                        aria-disabled={same || undefined}>
                        <span style={{ display: "inline-flex", flexDirection: "column", gap: 1, lineHeight: 1.3, textAlign: "start" }}>
                          <span>{SS.shift(k).emoji} {SS.shift(k).name}</span>
                          <span style={{ fontSize: ".75em", opacity: .55, fontWeight: 600 }}>{SS.timeText(k)}</span>
                        </span>
                      </button>
                    );
                  })}
                </div>
              </>
            )}
            <div className="row" style={{ gap: 10, marginTop: 22 }}>
              <button className="btn btn--ghost" style={{ flex: 1 }} onClick={() => setStep(1)}>←</button>
              <button className="btn btn--gold" disabled={!step2Ready}
                style={{ flex: 3, opacity: step2Ready ? 1 : .5 }}
                onClick={() => setStep(3)}>{t("review")} →</button>
            </div>
          </div>
        )}

        {/* ================================================================
            STEP 2: BUNDLE (working shifts)
            ================================================================ */}
        {step === 2 && isBundle && (
          <div className="screen-enter">
            <h3 className="step-h">📦 {selectedWork.length}-Day Bundle</h3>
            <p className="step-sub">Pick the shift you want back on all these days.</p>
            <div className="glass" style={{ padding: 12, marginTop: 10 }}>
              {selectedWork.map(c => (
                <div key={c.id} className="row" style={{ gap: 8, padding: "7px 0", borderBottom: "1px solid var(--line)" }}>
                  <span style={{ fontSize: 18 }}>{SS.shift(c.shift).emoji}</span>
                  <span style={{ flex: 1 }}><window.ShiftNameTime shiftKey={c.shift} /></span>
                  <span className="faint" style={{ fontSize: 12, fontWeight: 700 }}>{c.day} {c.date}</span>
                </div>
              ))}
            </div>
            <div className="section-label" style={{ marginTop: 16 }}>What shift do you want back on each day?</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {timeOptions.map(k => (
                <button key={k}
                  className={"pill" + (wantTypes.includes(k) ? " active" : "")}
                  onClick={() => setWantTypes(w => w.includes(k) ? w.filter(x => x !== k) : [...w, k])}>
                  <span style={{ display: "inline-flex", flexDirection: "column", gap: 1, lineHeight: 1.3, textAlign: "start" }}>
                    <span>{SS.shift(k).emoji} {SS.shift(k).name}</span>
                    <span style={{ fontSize: ".75em", opacity: .55, fontWeight: 600 }}>{SS.timeText(k)}</span>
                  </span>
                </button>
              ))}
            </div>
            <div className="row" style={{ gap: 10, marginTop: 16 }}>
              <button className="btn btn--ghost" style={{ flex: 1 }} onClick={() => setStep(1)}>←</button>
              <button className="btn btn--gold" disabled={!step2Ready}
                style={{ flex: 3, opacity: step2Ready ? 1 : .5 }}
                onClick={() => setStep(3)}>{t("review")} →</button>
            </div>
          </div>
        )}

        {/* ================================================================
            STEP 2: SINGLE DAY OFF SWAP (one Crown)
            ================================================================ */}
        {step === 2 && isRest && card && (
          <div className="screen-enter">
            <h3 className="step-h">👑 Day Off Swap</h3>
            <p className="step-sub">Give up one rest day, gain a different one — both agents stay at 5 working days.</p>
            <div className="offering-reco">
              <span className="offering-reco__emoji">{SS.shift(card.shift).emoji}</span>
              <span style={{ flex: 1 }}>
                <span className="offering-reco__lbl">Giving up your day off</span>
                <span className="offering-reco__name"><b>{card.day} {card.date}</b></span>
              </span>
              <button className="offering-reco__change" onClick={() => setStep(1)}>Change</button>
            </div>
            <div className="section-label" style={{ marginTop: 16 }}>Which day do you want off instead?</div>
            <div className="chiprow chiprow--wrap">
              {myWorkDays.map(c => (
                <button key={c.id}
                  className={"pill" + (wantRestDay === c.day ? " active" : "")}
                  onClick={() => setWantRestDay(c.day)}>
                  {c.day} · {SS.shift(c.shift).emoji} {SS.shift(c.shift).name}
                </button>
              ))}
            </div>
            {targetRestCard && (
              <div style={{ background: "rgba(245,197,24,.07)", border: "1px solid rgba(245,197,24,.2)", borderRadius: 12, padding: "13px 15px", marginTop: 10 }}>
                <div style={{ fontSize: 10, fontWeight: 800, opacity: .55, marginBottom: 8, textTransform: "uppercase", letterSpacing: ".06em" }}>Your schedule change</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <div style={{ background: "rgba(255,255,255,.06)", borderRadius: 8, padding: "9px 11px" }}>
                    <div style={{ fontSize: 10, opacity: .5, fontWeight: 700, marginBottom: 5 }}>{card.day} — giving up</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 20 }}>👑</span><span style={{ opacity: .3, fontSize: 11 }}>→</span>
                      <span style={{ fontSize: 20 }}>{SS.shift(targetRestCard.shift)?.emoji}</span>
                    </div>
                    <div style={{ fontSize: 10, opacity: .4, marginTop: 4 }}>day off → work day</div>
                  </div>
                  <div style={{ background: "rgba(245,197,24,.1)", borderRadius: 8, padding: "9px 11px" }}>
                    <div style={{ fontSize: 10, opacity: .5, fontWeight: 700, marginBottom: 5 }}>{wantRestDay} — new day off</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 20 }}>{SS.shift(targetRestCard.shift)?.emoji}</span><span style={{ opacity: .3, fontSize: 11 }}>→</span>
                      <span style={{ fontSize: 20 }}>👑</span>
                    </div>
                    <div style={{ fontSize: 10, opacity: .4, marginTop: 4 }}>work day → day off</div>
                  </div>
                </div>
              </div>
            )}
            <p className="faint" style={{ fontSize: 11, fontWeight: 600, marginTop: 8 }}>
              We'll match you with someone who rests on {wantRestDay || "your chosen day"} and works {card.day}.
            </p>
            <div className="row" style={{ gap: 10, marginTop: 22 }}>
              <button className="btn btn--ghost" style={{ flex: 1 }} onClick={() => setStep(1)}>←</button>
              <button className="btn btn--gold" disabled={!step2Ready}
                style={{ flex: 3, opacity: step2Ready ? 1 : .5 }}
                onClick={() => setStep(3)}>{t("review")} →</button>
            </div>
          </div>
        )}

        {/* ================================================================
            STEP 2: MULTI REST SWAP (2+ Crowns)
            ================================================================ */}
        {step === 2 && isRestBundle && (
          <div className="screen-enter">
            <h3 className="step-h">👑 Multi Rest Swap</h3>
            <p className="step-sub">For each day off you're giving up, pick a working day you want off instead.</p>

            {selectedCrowns.map(crownCard => {
              const targets = restBundleTargets(crownCard);
              const picked  = wantRestDaysMap[crownCard.id];
              return (
                <div key={crownCard.id} style={{ marginTop: 14 }}>
                  <div className="section-label" style={{ marginTop: 0 }}>
                    <span>👑 {crownCard.day} {crownCard.date} — want off on:</span>
                    {picked && <span style={{ color: "var(--gold)", fontWeight: 800 }}>{picked} ✓</span>}
                  </div>
                  <div className="chiprow chiprow--wrap">
                    {targets.map(tgt => (
                      <button key={tgt.id}
                        className={"pill" + (picked === tgt.day ? " active" : "")}
                        onClick={() => setWantRestDaysMap(m => ({ ...m, [crownCard.id]: tgt.day }))}>
                        {tgt.day} · {SS.shift(tgt.shift).emoji} {SS.shift(tgt.shift).name}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}

            {selectedCrowns.some(c => wantRestDaysMap[c.id]) && (
              <div style={{ background: "rgba(245,197,24,.07)", border: "1px solid rgba(245,197,24,.18)", borderRadius: 10, padding: "12px 14px", marginTop: 14 }}>
                <div style={{ fontSize: 10, fontWeight: 800, opacity: .55, marginBottom: 8, textTransform: "uppercase", letterSpacing: ".06em" }}>Schedule changes</div>
                {selectedCrowns.map(c => {
                  const target = wantRestDaysMap[c.id];
                  const tCard  = target ? allCards.find(x => x.day === target && x.shift !== "CROWN") : null;
                  return (
                    <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, fontWeight: 700, padding: "4px 0" }}>
                      <span>👑 {c.day}</span>
                      <span style={{ opacity: .3 }}>→</span>
                      <span style={{ opacity: tCard ? 1 : .35 }}>{tCard ? SS.shift(tCard.shift)?.emoji : "?"} {c.day} works</span>
                      <span style={{ opacity: .25, marginLeft: "auto" }}>·</span>
                      <span style={{ opacity: target ? 1 : .35, marginLeft: "auto" }}>
                        {target ? `gain 👑 ${target}` : "pick a day →"}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}

            <div className="row" style={{ gap: 10, marginTop: 16 }}>
              <button className="btn btn--ghost" style={{ flex: 1 }} onClick={() => setStep(1)}>←</button>
              <button className="btn btn--gold" disabled={!step2Ready}
                style={{ flex: 3, opacity: step2Ready ? 1 : .5 }}
                onClick={() => setStep(3)}>{t("review")} →</button>
            </div>
          </div>
        )}

        {/* ================================================================
            STEP 3: REVIEW (all kinds)
            ================================================================ */}
        {step === 3 && (
          <div className="screen-enter">
            <h3 className="step-h">{t("review")}</h3>

            {/* Card fan preview */}
            <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", marginTop: 10, marginBottom: 4 }}>
              {selectedCards.slice(0, 3).map((c, i) => (
                <div key={c.id} style={{
                  width: isTime ? 168 : 80,
                  transform: selectedCards.length > 1
                    ? `rotate(${(i - (Math.min(selectedCards.length, 3) - 1) / 2) * 3}deg) translateY(${i === 1 && selectedCards.length >= 3 ? 0 : 5}px)`
                    : "none" }}>
                  <window.ShiftCard shiftKey={c.shift} day={c.day} date={c.date}
                    size={isTime ? undefined : "sm"}
                    tierKey={me.tier} lang={lang} langSpec={me.lang}
                    trades={isTime ? app.trades : undefined} showRank={isTime} tilt={false} />
                </div>
              ))}
            </div>

            <div className="glass" style={{ padding: 14, marginTop: 14 }}>
              <div className="row between" style={{ fontSize: 13 }}>
                <span className="faint" style={{ fontWeight: 700 }}>Offering</span>
                <b style={{ textAlign: "end" }}>
                  {isTime       && `${SS.shift(card.shift).name} · ${card.day}`}
                  {isRest       && `👑 ${card.day} off`}
                  {isBundle     && selectedWork.map(c => c.day).join(" + ")}
                  {isRestBundle && selectedCrowns.map(c => `👑 ${c.day}`).join(" + ")}
                </b>
              </div>
              <div style={{ height: 1, background: "var(--line)", margin: "10px 0" }} />
              <div className="row between" style={{ fontSize: 13 }}>
                <span className="faint" style={{ fontWeight: 700 }}>{t("wants")}</span>
                <b style={{ textAlign: "end", maxWidth: "65%" }}>
                  {isTime       && (flex ? `Any ${card.day}` : wantTypes.map(k => SS.shift(k).name).join(" / "))}
                  {isRest       && `👑 ${wantRestDay} off`}
                  {isBundle     && (wantTypes.length > 0 ? wantTypes.map(k => SS.shift(k).name).join(" / ") + " each day" : "Any shift · each day")}
                  {isRestBundle && selectedCrowns.map(c => `👑 ${wantRestDaysMap[c.id] || "?"}`).join(" + ")}
                </b>
              </div>
              {(isRest || isRestBundle) && (
                <div className="cap-note">🛡️ Both stay at 5 working days</div>
              )}
            </div>

            <div className="section-label" style={{ marginTop: 16 }}>
              <span>Your note</span>
              <span className="faint" style={{ fontWeight: 700, fontSize: 11 }}>shows on market card</span>
            </div>
            <textarea className="note-input" rows={2} maxLength={140}
              value={note} onChange={e => setNote(e.target.value)}
              placeholder="Looking to swap this one." />
            <div className="faint" style={{ fontSize: 10, fontWeight: 700, textAlign: "end", marginTop: 2 }}>{note.length}/140</div>

            <div className="row" style={{ gap: 10, marginTop: 16 }}>
              <button className="btn btn--ghost" style={{ flex: 1 }} onClick={() => setStep(2)}>←</button>
              <button className="btn btn--gold" style={{ flex: 3 }} onClick={submit}>
                📤 {t("postToMarket")}
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  window.PostTrade = PostTrade;
})();

  </script>
  <script type="text/babel" data-presets="react">
// ===== screen-match.jsx =====
/* ===========================================================================
   ShiftSwap — Match & Confirm
   Two trade kinds:
     • time — same-day shift swap (you give a card, get theirs, same day)
     • rest — rest-day DOUBLE trade (swap a day off for a day off; both stay 5 days)
   Rendered inside the bottom sheet.
   =========================================================================== */
(function () {
  const { useState } = React;

  function ConfirmTick({ on, who }) {
    return (
      <div className={"confirm-tick" + (on ? " on" : "")}>
        <span className="tick">{on ? "✔" : "…"}</span>
        <span className="who">{who}</span>
      </div>
    );
  }

  function MatchSheet({ offer, onClose, onDone }) {
    const app = React.useContext(window.SSCtx);
    const { t } = app;
    const SS = window.SS;
    const me = SS.agent(SS.ME);
    const poster = SS.agent(offer.agent);
    const isRest = offer.kind === "rest";
    const isBundle = offer.kind === "bundle";
    const isRestBundle = offer.kind === "rest-bundle";

    const avail = app.handCards.filter(c => !app.listedIds.includes(c.id));

    // --- TIME swap: cards I could give (same day, a type they want) ---
    const eligible = (isRest || isBundle || isRestBundle) ? [] :
      avail.filter(c => c.day === offer.day && c.shift !== "CROWN" && offer.wantType.includes(c.shift));

    // --- BUNDLE: for each day in the bundle, find MY card matching what the poster wants ---
    const bundleLegs = isBundle ? offer.bundleCards.map(bc => ({
      day: bc.day, date: bc.date, theirShift: bc.shift,
      myCard: offer.wantType
        ? avail.find(c => c.day === bc.day && offer.wantType.includes(c.shift)) || null
        : avail.find(c => c.day === bc.day && c.shift !== "CROWN") || null,
    })) : [];
    const canBundle = isBundle && bundleLegs.length > 0 && bundleLegs.every(l => l.myCard);

    // --- REST BUNDLE: multiple Crowns for multiple Crowns ---
    const restBundleLegs = isRestBundle ? (offer.wantRestDaysList || []).map((giveDay, i) => ({
      giveDay,
      getDay:      offer.bundleCards?.[i]?.day,
      getDate:     offer.bundleCards?.[i]?.date,
      giveCard:    avail.find(c => c.day === giveDay && c.shift === "CROWN"),
      getWorkCard: avail.find(c => c.day === offer.bundleCards?.[i]?.day && c.shift !== "CROWN"),
    })) : [];
    const canRestBundle = isRestBundle && restBundleLegs.length > 0 && restBundleLegs.every(l => l.giveCard && l.getWorkCard);

    // --- REST double trade: the two days that move ---
    const myRestCard = isRest ? avail.find(c => c.day === offer.wantRestDay && c.shift === "CROWN") : null;
    const myWorkCard = isRest ? avail.find(c => c.day === offer.day && c.shift !== "CROWN") : null;
    const canRest = !!(isRest && myRestCard && myWorkCard);

    // Plain-language summary of MY OWN posted offer (shown when offer.mine,
    // so opening your own listing reads as a summary — not a self-trade).
    const mineOffering =
        isBundle      ? offer.bundleCards.map(c => c.day).join(" + ")
      : isRestBundle  ? offer.bundleCards.map(c => `👑 ${c.day}`).join(" + ")
      : isRest        ? `👑 ${offer.day} off`
      :                 `${SS.shift(offer.offered).name} · ${offer.day}`;
    const mineWants =
        isBundle      ? ((offer.wantType || []).map(k => SS.shift(k).name).join(" / ") || "Any shift") + " · each day"
      : isRestBundle  ? (offer.wantRestDaysList || []).map(d => `👑 ${d}`).join(" + ")
      : isRest        ? `👑 ${offer.wantRestDay} off`
      :                 ((offer.wantType || []).map(k => SS.shift(k).name).join(" / ") || "Any time");

    const [phase, setPhase] = useState(offer._startPhase || "detail"); // detail | propose | confirm | sealing | sealed
    const [myCardId, setMyCardId] = useState(offer._preCardId || null);
    const [copied, setCopied] = useState("");      // "" | "plain" | "slack"
    const [meOk, setMeOk] = useState(false);
    const [themOk, setThemOk] = useState(false);
    const [sealedShift, setSealedShift] = useState(null);

    const myCard = avail.find(c => c.id === myCardId);
    const shownShift = sealedShift || (myCard && myCard.shift) || null;

    const tt = (k) => SS.timeText(k);
    // null-safe time for a bundle leg's "my card" — null when I can't fulfil
    // that leg (e.g. viewing a bundle I don't have the matching shift for).
    const myTt = (l) => l.myCard ? tt(l.myCard.shift)
      : (offer.wantType && offer.wantType.length ? offer.wantType.map(tt).join(" / ") : "your matching shift");

    // ---- RTM message: TIMES (not card names) + full identity for both agents
    function buildRtm(fmt) {
      const myTier = SS.tier(me.tier).label, myLang = SS.LANG_NAMES[me.lang];
      const poTier = SS.tier(poster.tier).label, poLang = SS.LANG_NAMES[poster.lang];
      const myMail = SS.email(me), poMail = SS.email(poster);

      if (fmt === "slack") {
        if (isBundle) {
          return `*${bundleLegs.length}-day bundle swap* — ${bundleLegs.map(l => `${l.day} ${l.date}`).join(" + ")}\n`
            + `• *${me.name}* <mailto:${myMail}|${myMail}> _(${myTier} · ${myLang})_\n`
            + bundleLegs.map(l => `    ${l.day} ${l.date}: gives \`${myTt(l)}\` → takes \`${tt(l.theirShift)}\``).join("\n") + "\n"
            + `• *${poster.name}* <mailto:${poMail}|${poMail}> _(${poTier} · ${poLang})_\n`
            + bundleLegs.map(l => `    ${l.day} ${l.date}: gives \`${tt(l.theirShift)}\` → takes \`${myTt(l)}\``).join("\n") + "\n"

                  <window.ShiftCard shiftKey={offer.offered} day={offer.day} tierKey={poster.tier} tilt={false} />
                  <ConfirmTick on={themOk} who={poster.name.split(" ")[0]} />
                </div>
              </div>
              {phase === "confirm" && (
                <button className="btn btn--gold btn--full btn--lg" style={{ marginTop: 20 }} onClick={startSeal}>
                  ✔ {t("confirm")}
                </button>
              )}
            </div>
          )
        )}

        {/* ---------- SEALED ---------- */}
        {phase === "sealed" && (
          <div className="sealed-wrap">
            <div className="sealed-burst">🤝</div>
            <h2 style={{ fontFamily: "var(--display)", textAlign: "center", margin: "4px 0 2px", fontSize: 24 }}>{t("dealSealed")}</h2>
            <div className="row" style={{ justifyContent: "center", gap: 8, marginBottom: 4 }}>
              <span className="matchbadge">+{me.flexible ? 45 : 30} {t("xp")}</span>
              {isRest && <span className="badge-double">double</span>}
              {isRestBundle && <span className="badge-double">👑 {restBundleLegs.length}-day rest swap</span>}
              {isBundle && <span className="badge-double">📦 {bundleLegs.length}-day bundle</span>}
              {me.flexible && <span className="faint" style={{ fontSize: 11, fontWeight: 700 }}>{t("flexBonus")}</span>}
            </div>

            <div className="rtm-box">
              <div className="rtm-head">
                <span>📋 {t("rtmMsg")}</span>
                <span className="faint" style={{ fontSize: 10, fontWeight: 800 }}>AUTO-GENERATED</span>
              </div>
              <div className="rtm-warn">⚠️ Not official — Calabrio is the source of truth</div>
              <pre className="rtm-body">{rtm}</pre>
            </div>

            <div className="row" style={{ gap: 10, marginTop: 14 }}>
              <button className="btn btn--gold" style={{ flex: 1 }} onClick={() => copy("plain")}>
                {copied === "plain" ? "✓ Copied" : "⧉ Copy"}
              </button>
              <button className="btn btn--ghost" style={{ flex: 1 }} onClick={() => copy("slack")}>
                {copied === "slack" ? "✓ Copied" : "💬 Copy for Slack"}
              </button>
            </div>
            <button className="btn btn--ghost btn--full" style={{ marginTop: 10 }} onClick={onDone || onClose}>{t("done")}</button>
          </div>
        )}
      </>
    );
  }

  // a compact "give X → get Y" pair used in the double-trade confirm
  function MiniSwap({ give, get, giveLbl, getLbl }) {
    return (
      <div className="mini-swap">
        <div className="mini-swap__col">
          <window.ShiftCard shiftKey={give} size="sm" tilt={false} />
          <span className="mini-swap__lbl">{giveLbl}</span>
        </div>
        <span className="mini-swap__arrow">→</span>
        <div className="mini-swap__col">
          <window.ShiftCard shiftKey={get} size="sm" tilt={false} />
          <span className="mini-swap__lbl get">{getLbl}</span>
        </div>
      </div>
    );
  }

  window.MatchSheet = MatchSheet;
})();

  function ManagerLedger() {
    const app = React.useContext(window.SSCtx);
    const { t, lang } = app;
    const SS = window.SS;
    const heat = SS.SHIFT_HEAT;
    const vol = SS.WEEKLY_VOLUME;
    const maxVol = Math.max(...vol.map(v => v.n));
    const leaders = [...SS.AGENTS].sort((a, b) => b.trades - a.trades).slice(0, 5);
    const crown = heat.find(h => h.shift === "CROWN");

    const tierAgg = {};
    SS.AGENTS.forEach(a => {
      const lab = SS.tier(a.tier).label;
      tierAgg[lab] = (tierAgg[lab] || 0) + a.trades;
    });
    const tierRows = Object.entries(tierAgg).sort((a, b) => b[1] - a[1]);
    const maxTier = Math.max(...tierRows.map(r => r[1]));

    return (
      <div className="screen-enter">

        <div className="glass crown-index">
          <div style={{ fontSize: 30 }}>👑</div>

                <div className="heat-avoided" style={{ width: `${h.avoided}%` }} title={`${t("avoided")} ${h.avoided}`} />
              </div>
            </div>
          ))}
          <div className="row" style={{ gap: 14, marginTop: 10, fontSize: 10.5, fontWeight: 700 }}>
            <span className="row" style={{ gap: 5 }}><i className="dot" style={{ background: "var(--green)" }} /> {t("wanted")}</span>
            <span className="row" style={{ gap: 5 }}><i className="dot" style={{ background: "var(--red)" }} /> {t("avoided")}</span>

        {/* Weekly volume */}
        <div className="section-label">{t("weeklyVol")}</div>
        <div className="glass" style={{ padding: "16px 14px 10px" }}>
          <div className="vol-chart">
            {vol.map(v => (
              <div key={v.wk} className="vol-col">
                <div className="vol-bar" style={{ height: `${(v.n / maxVol) * 100}%` }}><span className="vol-n">{v.n}</span></div>
                <div className="vol-x">{v.wk.split(" ")[1]}</div>
              </div>
            ))}
          </div>
          <div className="faint" style={{ textAlign: "center", fontSize: 10, fontWeight: 700, marginTop: 4 }}>Apr → May</div>
        </div>

        {/* Leaderboard */}
        <div className="section-label">{t("leaderboard")}</div>
        <div className="glass" style={{ padding: 8 }}>
          {leaders.map((a, i) => (
            <div key={a.id} className="lead-row">
              <div className={"lead-rank r" + i}>{i + 1}</div>
              <div className="avatar sm">{SS.initials(a.name)}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12.5, fontWeight: 800 }}>{a.name} {a.flexible && "🖐️"}</div>
                <div className="faint" style={{ fontSize: 10.5, fontWeight: 700 }}>{SS.rankFor(a.trades).badge} {a.site}</div>
              </div>
              <div className="num" style={{ fontWeight: 800, color: "var(--gold)" }}>{a.trades}</div>

        {/* Tier activity */}
        <div className="section-label">{t("tierActivity")}</div>
        <div className="glass" style={{ padding: 14 }}>
          {tierRows.map(([lab, n]) => (
            <Bar key={lab} label={lab} value={n} max={maxTier} color="linear-gradient(90deg,#a855f7,#6d28d9)" sub={`${n} ${t("trades")}`} />
          ))}
        </div>
      </div>
    );
  }

  function Ledger() {
    const app = React.useContext(window.SSCtx);
    const { t } = app;

      <div>

          <button className={view === "agent" ? "on" : ""} onClick={() => setView("agent")}>{t("agentView")}</button>

  window.Ledger = Ledger;
})();

  <script type="text/babel" data-presets="react">
// ===== screen-admin.jsx =====
/* ===========================================================================
   ShiftSwap — Admin Dashboard
   Full-page: Upload Schedule | Active Trades | Agent List | Analytics
   =========================================================================== */
(function () {
  const { useState, useRef } = React;
  const SS = window.SS;

  function em(key) { return SS.shift(key)?.emoji || "·"; }

  function matchAgent(name) {
    if (!name || !name.trim()) return null;
    const n = name.trim().toLowerCase().replace(/[^a-z ]/g, "");
    return SS.AGENTS.find(a => a.name.toLowerCase().replace(/[^a-z ]/g, "") === n)
      || SS.AGENTS.find(a => {
           const parts = a.name.toLowerCase().split(" ");
           return parts.some(p => p.length > 3 && n.includes(p));
         })
      || null;
  }

  function normalizeShift(cell) {
    if (!cell && cell !== 0) return null;
    const v = String(cell).trim().toUpperCase().replace(/[\s\-_]/g, "");
    if (SS.SHIFTS[v]) return v;
    const ALIASES = { "RD":"CROWN","DO":"CROWN","DAYOFF":"CROWN","REST":"CROWN","AL":"LEAVE","ANNUALLEAVE":"LEAVE","HOLIDAY":"LEAVE","MS":"GRIND","AS":"GOLDEN","NS":"OWL" };
    if (ALIASES[v]) return ALIASES[v];
    const found = Object.values(SS.SHIFTS).find(s => s.name.toUpperCase().replace(/[\s\-_]/g,"") === v);
    return found ? found.key : null;
  }

  /* ============================================================
     Upload Tab
     ============================================================ */
  function UploadTab({ schedule, onImported }) {
    const [dragging, setDragging] = useState(false);
    const [file, setFile] = useState(null);
    const [rows, setRows] = useState(null);
    const [fixes, setFixes] = useState({});
    const [busy, setBusy] = useState(false);
    const [done, setDone] = useState(null);   // null | { imported, alerts }
    const [err, setErr] = useState(null);
    const ref = useRef();

    function processFile(f) {
      if (!window.XLSX) { setErr("SheetJS not loaded — reload the page."); return; }
      setErr(null); setFile(f); setRows(null); setDone(null);
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const wb = window.XLSX.read(ev.target.result, { type: "binary" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const raw = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
          if (raw.length < 2) { setErr("File looks empty."); return; }
          let start = 0;
          const fc = String(raw[0][0] || "").toLowerCase();
          if (fc.includes("agent") || fc.includes("name") || fc === "") start = 1;
          const days1 = SS.DAYS   || [];
          const days2 = (SS.DAYS_W2 || []);
          const parsed = raw.slice(start)
            .filter(r => String(r[0] || "").trim())
            .map(r => {
              const agentName = String(r[0]).trim();
              const matched  = matchAgent(agentName);
              const w1 = days1.map((d, i) => ({ day: d.key, date: d.date, shift: normalizeShift(r[1 + i]) }));
              const w2 = days2.map((d, i) => ({ day: d.key, date: d.date, shift: normalizeShift(r[8 + i]) }));
              const hasW2 = r.length > 8 && r.slice(8, 15).some(c => String(c || "").trim());
              return { agentName, matched, w1, w2, hasW2 };
            });
          setRows(parsed);
          const f0 = {};
          parsed.filter(p => !p.matched).forEach(p => { f0[p.agentName] = ""; });
          setFixes(f0);
        } catch (ex) { setErr("Parse error: " + ex.message); }
      };
      reader.readAsBinaryString(f);
    }

    function confirmImport() {
      setBusy(true);
      setTimeout(() => {
        const nW1 = { ...(schedule.w1 || {}) };
        const nW2 = { ...(schedule.w2 || {}) };
        const alerts = [];
        rows.forEach(row => {
          const fix = fixes[row.agentName];
          const ag  = row.matched || (fix && fix !== "__skip" ? SS.AGENTS.find(a => a.id === fix) : null);
          if (!ag) return;
          const oldW1 = (schedule.w1 || {})[ag.id] || [];
          const changed = row.w1.some((nc, i) => oldW1[i] && nc.shift && oldW1[i].shift !== nc.shift);
          nW1[ag.id] = row.w1.map(d => ({ ...d, agent: ag.id }));
          if (row.hasW2) nW2[ag.id] = row.w2.map(d => ({ ...d, agent: ag.id }));
          if (changed) alerts.push({ agentId: ag.id, msg: "Your schedule was updated — check your new hand." });
        });
        const summary = { imported: rows.length, changed: alerts.length };
        setBusy(false); setDone(summary);
        onImported({ w1: nW1, w2: nW2 }, alerts);
      }, 1500);
    }

    const unmatched   = rows ? rows.filter(r => !r.matched) : [];
    const canConfirm  = rows && !busy && unmatched.every(r => fixes[r.agentName]);
    const hasW2Cols   = rows && rows.some(r => r.hasW2);
    const days1 = SS.DAYS   || [];
    const days2 = SS.DAYS_W2 || [];

    return (
      <div style={{ maxWidth: 900, margin: "0 auto" }}>
        <h2 style={{ fontSize: 22, fontWeight: 800, marginBottom: 8 }}>Upload Schedule</h2>
        <p style={{ fontSize: 13, opacity: .55, lineHeight: 1.7, marginBottom: 28, maxWidth: 560 }}>
          Upload a biweekly <b>.xlsx</b> file. <b>Column A:</b> agent name ·
          <b> B–H:</b> Week 1 shifts (Mon–Sun) · <b>I–O:</b> Week 2 (optional).<br />
          Shift codes: <code>GRIND EARLY MORNING GOLDEN DUSK OWL CROWN LEAVE</code>
        </p>

        {/* Drop zone */}
        {!rows && !done && (
          <div
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={e => { e.preventDefault(); setDragging(false); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }}
            onClick={() => ref.current.click()}
            style={{
              border: `2px dashed ${dragging ? "#f5c518" : "rgba(255,255,255,.12)"}`,
              borderRadius: 16, padding: "56px 24px", textAlign: "center", cursor: "pointer",
              background: dragging ? "rgba(245,197,24,.05)" : "rgba(255,255,255,.02)", transition: "all .2s",
            }}>
            <input ref={ref} type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }}
              onChange={e => { if (e.target.files[0]) processFile(e.target.files[0]); }} />
            <div style={{ fontSize: 48, marginBottom: 14 }}>📤</div>
            <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 6 }}>Drop .xlsx file here</div>
            <div style={{ fontSize: 12, opacity: .4 }}>or click to browse — .xlsx · .xls · .csv</div>
          </div>
        )}

        {err && (
          <div style={{ background: "rgba(239,68,68,.1)", border: "1px solid rgba(239,68,68,.28)", borderRadius: 10, padding: "12px 16px", color: "#ef4444", fontSize: 13, fontWeight: 700, marginTop: 14 }}>
            ⚠️ {err}
          </div>
        )}

        {/* Success state */}
        {done && (
          <div style={{ background: "rgba(34,197,94,.07)", border: "1px solid rgba(34,197,94,.22)", borderRadius: 14, padding: 28, textAlign: "center" }}>
            <div style={{ fontSize: 44, marginBottom: 12 }}>✅</div>
            <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 6 }}>Schedule imported</div>
            <div style={{ fontSize: 13, opacity: .55 }}>
              {done.imported} agents · {done.changed} schedule {done.changed === 1 ? "change" : "changes"} detected.
              {done.changed > 0 && " Affected agents will see an alert on their home screen."}
            </div>
            <button onClick={() => { setRows(null); setFile(null); setDone(null); }}
              style={{ marginTop: 20, padding: "10px 28px", borderRadius: 9, border: "1px solid rgba(255,255,255,.14)", background: "transparent", color: "inherit", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>
              Upload another
            </button>
          </div>
        )}

        {/* Preview */}
        {rows && !done && (
          <>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 14, gap: 12, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontWeight: 800, fontSize: 15 }}>Preview — {rows.length} agents</div>
                <div style={{ fontSize: 12, opacity: .45, marginTop: 2 }}>{file?.name}</div>
                {unmatched.length > 0 && (
                  <div style={{ fontSize: 12, color: "#fbbf24", marginTop: 4, fontWeight: 700 }}>
                    ⚠️ {unmatched.length} name{unmatched.length > 1 ? "s" : ""} not matched — assign before importing
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 10, flexShrink: 0 }}>
                <button onClick={() => { setRows(null); setFile(null); }}
                  style={{ padding: "9px 20px", borderRadius: 9, border: "1px solid rgba(255,255,255,.12)", background: "transparent", color: "inherit", cursor: "pointer", fontSize: 13 }}>
                  Cancel
                </button>
                <button onClick={confirmImport} disabled={!canConfirm}
                  style={{ padding: "9px 22px", borderRadius: 9, border: "none", fontWeight: 800, fontSize: 13, cursor: canConfirm ? "pointer" : "not-allowed",
                    background: canConfirm ? "#f5c518" : "rgba(255,255,255,.08)", color: canConfirm ? "#1a1200" : "rgba(255,255,255,.25)" }}>
                  {busy ? "Importing…" : "✓ Confirm Import"}
                </button>
              </div>
            </div>

            {/* Unmatched resolver */}
            {unmatched.length > 0 && (
              <div style={{ background: "rgba(251,191,36,.06)", border: "1px solid rgba(251,191,36,.2)", borderRadius: 12, padding: "16px 18px", marginBottom: 16 }}>
                <div style={{ fontWeight: 800, fontSize: 13, color: "#fbbf24", marginBottom: 12 }}>🚩 Flagged — Unmatched Names</div>
                {unmatched.map(row => (
                  <div key={row.agentName} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 0", borderTop: "1px solid rgba(255,255,255,.05)", fontSize: 13 }}>
                    <span style={{ flex: "0 0 190px", fontWeight: 700, opacity: .75 }}>{row.agentName}</span>
                    <span style={{ opacity: .3, fontSize: 11 }}>→</span>
                    <select value={fixes[row.agentName] || ""}
                      onChange={e => setFixes(f => ({ ...f, [row.agentName]: e.target.value }))}
                      style={{ flex: 1, padding: "7px 10px", borderRadius: 8, border: "1px solid rgba(255,255,255,.12)", background: "#15152a", color: "inherit", fontSize: 13 }}>
                      <option value="">— assign to agent —</option>
